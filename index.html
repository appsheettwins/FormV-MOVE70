<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-MOVE 🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f1f5f9; }
        .gradient-bg { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .success-card { background: white; border-top: 8px solid #4f46e5; border-radius: 3rem; }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600">กำลังโหลดข้อมูลกิจกรรม...</p>
    </div>

    <div class="gradient-bg text-white pt-14 pb-32 px-6 rounded-b-[4rem] shadow-2xl relative z-10 text-center">
        <h1 class="text-4xl font-black tracking-tighter">V-MOVE 🚗</h1>
        <p class="text-indigo-100 text-sm mt-2">ยินดีต้อนรับคุณ <span id="userNameDisplay" class="font-bold text-yellow-300">...</span> ✨</p>
    </div>

    <div class="max-w-md mx-auto px-5 -mt-24 relative z-20">
        <div class="glass-card rounded-[3rem] shadow-2xl p-8 mb-10">
            
            <div id="formSection">
                <form id="meritForm" class="space-y-6">
                    <div class="text-center mb-4"><h2 class="text-xl font-black text-gray-800 uppercase">สำรองที่นั่ง 📝</h2></div>
                    
                    <div>
                        <label class="text-[10px] font-black text-gray-400 ml-4 uppercase">👤 ชื่อ-นามสกุล</label>
                        <input type="text" id="fullname" required class="w-full px-6 py-4 rounded-2xl border bg-gray-50/50 focus:ring-4 focus:ring-indigo-100 outline-none" placeholder="พิมพ์ชื่อ-นามสกุล">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-gray-400 ml-4 uppercase">📞 เบอร์โทรศัพท์</label>
                        <input type="tel" id="phone" required maxlength="10" class="w-full px-6 py-4 rounded-2xl border bg-gray-50/50 focus:ring-4 focus:ring-indigo-100 outline-none" placeholder="08XXXXXXXX">
                    </div>

                    <div>
                        <label class="text-[10px] font-black text-gray-400 ml-4 uppercase">🗓️ กิจกรรม</label>
                        <select id="activity" required class="w-full px-6 py-4 rounded-2xl border bg-white outline-none focus:ring-4 focus:ring-indigo-100 appearance-none" onchange="updateSubOptions()">
                            <option value="" disabled selected>กำลังโหลดข้อมูล...</option>
                        </select>
                    </div>

                    <div id="subContainer" class="hidden">
                        <label class="text-[10px] font-black text-indigo-400 ml-4 uppercase">📍 จุดรับ</label>
                        <select id="subOption" class="w-full px-6 py-4 rounded-2xl border border-indigo-100 bg-indigo-50/50 outline-none font-bold focus:ring-4 focus:ring-indigo-100 appearance-none"></select>
                    </div>

                    <button type="submit" class="w-full gradient-bg text-white font-black py-5 rounded-[2rem] shadow-xl active:scale-95 transition-all text-lg mt-4">ยืนยันข้อมูลจอง 🚀</button>
                </form>
            </div>

            <div id="successView" class="hidden">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-black text-indigo-600 uppercase">ลงทะเบียนสำเร็จ</h2>
                    <p class="text-gray-400 text-xs">สรุปข้อมูลการเดินทางของคุณ</p>
                </div>
                
                <div id="summaryDetails" class="success-card p-8 space-y-6 shadow-inner mb-8 bg-gray-50 border border-gray-100">
                    </div>

                <button onclick="location.reload()" class="w-full py-5 bg-gray-100 rounded-[2rem] font-bold text-gray-500 hover:bg-gray-200 transition-all uppercase text-sm tracking-widest">จองเพิ่ม ➕</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7"; 
    const API_URL = "https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec"; 

    let activityConfig = {};
    let liffProfile = {};

    async function initApp() {
        showLoad(true);
        try {
            // ดึงข้อมูลกิจกรรม (เพิ่ม timestamp เพื่อป้องกัน cache)
            const response = await fetch(`${API_URL}?action=getConfig&t=${new Date().getTime()}`);
            
            if (!response.ok) throw new Error('Network response was not ok');
            
            activityConfig = await response.json();
            console.log("Loaded Config:", activityConfig); // ตรวจสอบใน Console

            // เริ่มต้น LIFF
            await liff.init({ liffId: LIFF_ID });
            if (liff.isLoggedIn()) {
                liffProfile = await liff.getProfile();
                document.getElementById('userNameDisplay').textContent = liffProfile.displayName;
            } else {
                liff.login();
            }

            updateDropdowns();
        } catch (e) {
            console.error('Error loading app:', e);
            // ถ้าดึงไม่ได้ ให้ลองดึงอีกครั้งหลังจากผ่านไป 2 วินาที
            setTimeout(initApp, 2000);
        }
        showLoad(false);
    }

    function updateDropdowns() {
        const sel = document.getElementById('activity');
        const keys = Object.keys(activityConfig);
        
        if (keys.length > 0) {
            sel.innerHTML = '<option value="" disabled selected>-- เลือกกิจกรรม --</option>' + 
                keys.map(k => `<option value="${k}">${k}</option>`).join('');
        } else {
            sel.innerHTML = '<option value="" disabled selected>❌ ไม่พบข้อมูลกิจกรรม</option>';
        }
    }

        function updateSubOptions() {
            const actKey = document.getElementById('activity').value;
            const subSel = document.getElementById('subOption');
            const container = document.getElementById('subContainer');
            
            if (actKey && activityConfig[actKey]) {
                const list = activityConfig[actKey].list;
                subSel.innerHTML = list.map(item => `<option value="${item.detail}">${item.detail}</option>`).join('');
                container.classList.remove('hidden');
            } else {
                container.classList.add('hidden');
            }
        }

        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            showLoad(true);
            
            const actKey = document.getElementById('activity').value;
            const detailKey = document.getElementById('subOption').value;
            const matchedItem = activityConfig[actKey].list.find(i => i.detail === detailKey);

            const payload = {
                action: 'register',
                userId: liffProfile.userId || 'Guest',
                displayName: liffProfile.displayName || 'Guest',
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                activity: actKey,
                subOption: detailKey,
                travelTime: matchedItem ? matchedItem.time : '-'
            };

            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                renderSummary(payload);
                document.getElementById('formSection').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
            } catch(e) { alert('ระบบขัดข้อง'); }
            showLoad(false);
        };

        function renderSummary(data) {
            document.getElementById('summaryDetails').innerHTML = `
                <div class="space-y-1">
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest">Passenger</p>
                    <p class="text-xl font-bold text-gray-800">${data.fullname}</p>
                </div>
                <div class="space-y-1 border-t border-gray-100 pt-4">
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest">Contact</p>
                    <p class="text-xl font-bold text-gray-800">${data.phone}</p>
                </div>
                <div class="space-y-1 border-t border-gray-100 pt-4">
                    <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest">Activity</p>
                    <p class="text-xl font-bold text-indigo-600">${data.activity}</p>
                </div>
                <div class="flex justify-between border-t border-gray-100 pt-4">
                    <div class="space-y-1">
                        <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest">Location</p>
                        <p class="text-lg font-bold text-gray-800">${data.subOption}</p>
                    </div>
                    <div class="space-y-1 text-right">
                        <p class="text-[10px] font-black text-orange-400 uppercase tracking-widest">Departure</p>
                        <p class="text-xl font-black text-gray-900 underline decoration-orange-300">${data.travelTime}</p>
                    </div>
                </div>
            `;
        }

        function showLoad(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        window.onload = initApp;
    </script>
</body>
</html>
