<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-MOVE 🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .admin-gradient { background: linear-gradient(135deg, #0f172a 0%, #334155 100%); }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body>
    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p id="loadingText" class="font-bold text-indigo-600">กำลังโหลด...</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-20 px-6 rounded-b-[3rem] shadow-lg mb-[-30px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold">V-MOVE 🚗</h1>
            <div class="flex gap-2">
                <button onclick="openAdmin()" class="bg-white/20 p-3 rounded-2xl hover:bg-white/40">🛠️ แอดมิน</button>
                <button onclick="toggleSearchModal(true)" class="bg-white/20 p-3 rounded-2xl">🔍 ค้นหา</button>
            </div>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form id="meritForm" class="space-y-4">
                <input type="text" id="fullname" required class="w-full p-4 rounded-xl border" placeholder="ชื่อ-นามสกุล">
                <input type="tel" id="phone" required maxlength="10" class="w-full p-4 rounded-xl border" placeholder="เบอร์โทรศัพท์">
                <select id="activity" required class="w-full p-4 rounded-xl border" onchange="updateSubOptions()"></select>
                <div id="subContainer" class="hidden">
                    <select id="subOption" class="w-full p-4 rounded-xl border bg-indigo-50"></select>
                </div>
                <button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl">ยืนยันการจอง</button>
            </form>
            <div id="successView" class="hidden text-center py-10">
                <div class="text-5xl mb-4">✅</div>
                <h3 class="text-xl font-bold text-green-600">ลงทะเบียนสำเร็จ</h3>
                <button onclick="location.reload()" class="mt-6 text-indigo-600 font-bold underline">จองเพิ่มอีกรายการ</button>
            </div>
        </div>
    </div>

    <div id="adminView" class="hidden fixed inset-0 bg-white z-[50] overflow-y-auto">
        <div class="admin-gradient p-6 text-white flex justify-between items-center">
            <h2 class="text-xl font-bold">รายชื่อผู้จองทั้งหมด</h2>
            <button onclick="closeAdmin()" class="bg-red-500 px-4 py-2 rounded-xl text-sm font-bold">ปิดหน้าต่าง</button>
        </div>
        <div class="p-4">
            <div class="flex gap-2 mb-4">
                <input type="text" id="adminSearch" oninput="filterTable()" class="flex-1 p-3 border rounded-xl" placeholder="ค้นชื่อ/เบอร์...">
                <div class="bg-indigo-100 text-indigo-700 p-3 rounded-xl font-bold">รวม <span id="total">0</span></div>
            </div>
            <div class="overflow-x-auto shadow-sm border rounded-xl">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-100 text-gray-600 uppercase">
                        <tr>
                            <th class="p-4">ชื่อ</th><th class="p-4">เบอร์</th><th class="p-4">กิจกรรม</th><th class="p-4">รายละเอียด</th>
                        </tr>
                    </thead>
                    <tbody id="adminBody" class="divide-y"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="searchModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-3xl p-6">
            <h3 class="font-bold text-lg mb-4">🔍 ค้นหาด้วยเบอร์โทร</h3>
            <input type="tel" id="searchPhone" oninput="searchData()" class="w-full p-4 border rounded-xl mb-4" placeholder="ใส่เบอร์โทร...">
            <div id="searchResults" class="max-h-60 overflow-y-auto space-y-2"></div>
            <button onclick="toggleSearchModal(false)" class="w-full mt-4 text-gray-400 py-2">ปิด</button>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec"; 

        let currentConfig = {};
        let allData = [];

        async function init() {
            showLoad(true);
            try {
                const res = await fetch(`${API_URL}?action=getConfig`);
                currentConfig = await res.json();
                const sel = document.getElementById('activity');
                sel.innerHTML = '<option value="">-- เลือกกิจกรรม --</option>' + Object.keys(currentConfig).map(k => `<option value="${k}">${k}</option>`).join('');
                
                await liff.init({ liffId: LIFF_ID });
                if(!liff.isLoggedIn()) liff.login();
            } catch(e) { console.error(e); }
            showLoad(false);
        }

        function updateSubOptions() {
            const val = document.getElementById('activity').value;
            const sub = document.getElementById('subOption');
            const container = document.getElementById('subContainer');
            if(val && currentConfig[val].list.length > 0) {
                sub.innerHTML = currentConfig[val].list.map(i => `<option value="${i}">${i}</option>`).join('');
                container.classList.remove('hidden');
            } else { container.classList.add('hidden'); }
        }

        async function openAdmin() {
            showLoad(true, "กำลังโหลดรายชื่อ...");
            try {
                const res = await fetch(`${API_URL}?action=read&t=${Date.now()}`);
                const json = await res.json();
                allData = json.results || [];
                renderTable(allData);
                document.getElementById('adminView').classList.remove('hidden');
            } catch(e) { alert("โหลดข้อมูลไม่สำเร็จ กรุณาเช็กสิทธิ์การ Deploy"); }
            showLoad(false);
        }

        function renderTable(data) {
            document.getElementById('total').innerText = data.length;
            document.getElementById('adminBody').innerHTML = data.map(i => `<tr><td class="p-4 font-medium">${i.fullname}</td><td class="p-4">${i.phone}</td><td class="p-4"><span class="bg-blue-100 px-2 py-1 rounded text-xs">${i.activity}</span></td><td class="p-4 text-gray-400">${i.subOption}</td></tr>`).join('');
        }

        function filterTable() {
            const q = document.getElementById('adminSearch').value.toLowerCase();
            const filtered = allData.filter(i => i.fullname.toLowerCase().includes(q) || i.phone.includes(q));
            renderTable(filtered);
        }

        document.getElementById('meritForm').onsubmit = async (e) => {
            e.preventDefault();
            showLoad(true, "กำลังบันทึก...");
            const profile = await liff.getProfile();
            const payload = {
                action: 'register',
                userId: profile.userId,
                displayName: profile.displayName,
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                activity: document.getElementById('activity').value,
                subOption: document.getElementById('subOption').value || '-'
            };
            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            const history = JSON.parse(localStorage.getItem('vhistory') || '[]');
            history.unshift(payload);
            localStorage.setItem('vhistory', JSON.stringify(history));
            document.getElementById('meritForm').classList.add('hidden');
            document.getElementById('successView').classList.remove('hidden');
            showLoad(false);
        };

        function searchData() {
            const q = document.getElementById('searchPhone').value;
            const history = JSON.parse(localStorage.getItem('vhistory') || '[]');
            const filtered = history.filter(h => h.phone.includes(q));
            document.getElementById('searchResults').innerHTML = filtered.map(h => `<div class="p-3 bg-gray-50 rounded-xl"><b>${h.fullname}</b><br><small>${h.activity} - ${h.subOption}</small></div>`).join('');
        }

        function closeAdmin() { document.getElementById('adminView').classList.add('hidden'); }
        function toggleSearchModal(s) { document.getElementById('searchModal').classList.toggle('hidden', !s); }
        function showLoad(s, t="โหลดข้อมูล...") { document.getElementById('loadingText').innerText = t; document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        
        window.onload = init;
    </script>
</body>
</html>
