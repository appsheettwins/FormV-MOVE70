<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สำรองที่นั่งV-MOVE🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { border-bottom: 4px solid #6366f1; color: #4338ca; background: rgba(99, 102, 241, 0.05); }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:1000; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600 animate-pulse">กำลังบันทึกข้อมูล... ☁️</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-center">
                <button id="adminLoginBtn" onclick="toggleAdminLogin(true)" class="glass-effect p-3 rounded-2xl hover:bg-white/30">🛠️</button>
                <div>
                    <h1 class="text-2xl font-bold">สำรองที่นั่งV-MOVE🚗</h1>
                    <p class="text-sm text-yellow-300">สวัสดีคุณ <span id="userNameDisplay" class="font-bold underline">...</span> 🙏</p>
                </div>
            </div>
            <button id="searchBtn" onclick="toggleSearchModal(true)" class="glass-effect p-3 rounded-2xl">🔍</button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 min-h-[400px]">
            <form id="meritForm" class="space-y-6">
                <div>
                    <label class="text-sm font-medium text-gray-700 ml-1">👦 ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="ระบุชื่อและนามสกุล">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 ml-1">📞 เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required maxlength="10" pattern="[0-9]{10}" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="08XXXXXXXX">
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700 ml-1">🗓️ เลือกกิจกรรม</label>
                    <select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white outline-none"></select>
                </div>
                <div id="subOptionContainer" class="hidden">
                    <label class="text-sm font-medium text-gray-700 ml-1">📍 รายละเอียด</label>
                    <select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50 outline-none"></select>
                </div>
                <button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">✨ ยืนยันการจอง</button>
            </form>

            <div id="successMessage" class="hidden animate-in text-center py-6">
                <div class="text-6xl mb-4">✅</div>
                <h3 class="text-xl font-bold text-green-600 mb-2">บันทึกข้อมูลแล้ว!</h3>
                <p class="text-gray-500 text-sm mb-6">ลงทะเบียนสำเร็จ! รอการยืนยันการสำรองที่นั่ง จะส่งข้อความให้ทาง LINE นะคะ 🙏</p>
                <div id="summaryCard" class="bg-gray-50 rounded-2xl p-6 text-left relative overflow-hidden mb-6 border border-gray-100">
                    <div id="summaryColorBar" class="absolute left-0 top-0 bottom-0 w-2"></div>
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">สรุปการจอง</p>
                    <div class="text-sm space-y-1">
                        <p><b>ชื่อ:</b> <span id="sumName"></span></p>
                        <p><b>กิจกรรม:</b> <span id="sumAct"></span></p>
                        <p id="sumSub" class="text-xs text-gray-500 italic"></p>
                    </div>
                </div>
                <button onclick="resetRegistrationForm()" class="w-full py-4 bg-gray-100 text-gray-700 font-bold rounded-2xl">➕ เพิ่มรายการใหม่</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7";
        const API_URL = "ใส่_WEB_APP_URL_ที่นี่"; // *** เปลี่ยนเป็น URL ของคุณ ***

        const defaultOptions = {
            'act1': { label: 'ธรรมยาตรา 🚶', color: '#6366f1', list: ['2 ม.ค. - วัดพระธรรมกาย', '5 ม.ค. - อนุสรณ์สถาน'] },
            'act2': { label: 'จุดประทีป ✨', color: '#f59e0b', list: ['ลานธรรม', 'มหาเจดีย์'] }
        };

        let currentConfig = JSON.parse(localStorage.getItem('merit_config')) || defaultOptions;
        let liffProfile = {};

        async function initApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    liffProfile = await liff.getProfile();
                    document.getElementById('userNameDisplay').textContent = liffProfile.displayName;
                } else { liff.login(); }
            } catch (err) { console.error(err); }
            updateDropdowns();
        }

        function updateDropdowns() {
            const select = document.getElementById('activity');
            select.innerHTML = '<option value="" disabled selected>เลือกกิจกรรม...</option>' + 
                Object.keys(currentConfig).map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
        }

        document.getElementById('activity').onchange = function() {
            const sub = document.getElementById('subOption');
            const data = currentConfig[this.value];
            if (data && data.list.length > 0) {
                sub.innerHTML = data.list.map(t => `<option value="${t}">${t}</option>`).join('');
                document.getElementById('subOptionContainer').classList.remove('hidden');
            } else { document.getElementById('subOptionContainer').classList.add('hidden'); }
        };

        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            const actKey = document.getElementById('activity').value;
            const config = currentConfig[actKey];
            const data = {
                action: 'register',
                userId: liffProfile.userId,
                displayName: liffProfile.displayName,
                pictureUrl: liffProfile.pictureUrl,
                statusMessage: liffProfile.statusMessage,
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                activity: config.label,
                subOption: document.getElementById('subOption').value || '-'
            };

            try {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                document.getElementById('sumName').textContent = data.fullname;
                document.getElementById('sumAct').textContent = data.activity;
                document.getElementById('sumSub').textContent = data.subOption;
                document.getElementById('summaryColorBar').style.backgroundColor = config.color;

                const history = JSON.parse(localStorage.getItem('merit_history') || '[]');
                history.unshift(data);
                localStorage.setItem('merit_history', JSON.stringify(history));

                this.classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');
            } catch (err) { alert('บันทึกไม่สำเร็จ กรุณาลองใหม่'); }
            document.getElementById('loadingOverlay').style.display = 'none';
        };

        function resetRegistrationForm() {
            document.getElementById('meritForm').reset();
            document.getElementById('meritForm').classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            document.getElementById('subOptionContainer').classList.add('hidden');
        }

        // --- ส่วนเสริมฟังก์ชัน Admin และ Search จาก v2 ---
        function toggleAdminLogin(s) { document.getElementById('adminLoginModal').classList.toggle('hidden', !s); }
        function toggleSearchModal(s) { document.getElementById('searchModal').classList.toggle('hidden', !s); }
        // ... (ฟังก์ชัน Search และ Admin อื่นๆ สามารถคัดลอกมาวางต่อได้เลย)

        window.onload = initApp;
    </script>
</body>
</html>
