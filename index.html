<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สำรองที่นั่ง V-MOVE 🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .active-tab { border-bottom: 4px solid #6366f1; color: #4338ca; background: rgba(99, 102, 241, 0.05); }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:1000; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600 animate-pulse">กำลังบันทึกข้อมูล... ☁️</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-center">
                <button id="adminLoginBtn" onclick="toggleAdminLogin(true)" class="glass-effect p-3 rounded-2xl hover:bg-white/30">
                    🛠️
                </button>
                <div>
                    <h1 class="text-2xl font-bold">V-MOVE Booking 🚗</h1>
                    <p class="text-sm text-yellow-300 font-light">สวัสดีคุณ <span id="userNameDisplay" class="font-bold underline">...</span> 🙏</p>
                </div>
            </div>
            <button id="searchBtn" onclick="toggleSearchModal(true)" class="glass-effect p-3 rounded-2xl">
                🔍
            </button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 min-h-[400px]">
            <form id="meritForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700 ml-1">👤 ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="ระบุชื่อและนามสกุล">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700 ml-1">📞 เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required maxlength="10" pattern="[0-9]{10}" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="08XXXXXXXX">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700 ml-1">🗓️ เลือกกิจกรรม</label>
                    <select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white outline-none"></select>
                </div>
                <div id="subOptionContainer" class="space-y-2 hidden">
                    <label class="text-sm font-medium text-gray-700 ml-1">📍 ระบุรายละเอียด/สถานที่</label>
                    <select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50 outline-none"></select>
                </div>
                <button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">✨ ยืนยันจองที่นั่ง</button>
            </form>

            <div id="successMessage" class="hidden animate-in text-center py-6">
                <div class="text-6xl mb-4">✅</div>
                <h3 class="text-xl font-bold text-green-600 mb-2">ลงทะเบียนสำเร็จ!</h3>
                <p class="text-gray-500 text-sm mb-6 px-4">รอการยืนยันการสำรองที่นั่งทาง LINE นะคะ 🙏</p>
                
                <div id="summaryCard" class="bg-gray-50 rounded-2xl p-6 space-y-3 border border-gray-100 mb-6 text-left relative overflow-hidden">
                    <div id="summaryColorBar" class="absolute left-0 top-0 bottom-0 w-2"></div>
                    <div class="flex justify-between border-b pb-2 text-sm"><span>ผู้จอง:</span><span id="sumName" class="font-bold"></span></div>
                    <div class="flex justify-between border-b pb-2 text-sm"><span>กิจกรรม:</span><span id="sumAct" class="font-bold"></span></div>
                    <p id="sumSub" class="text-gray-500 text-xs italic pt-1"></p>
                </div>
                <button onclick="resetRegistrationForm()" class="w-full py-4 bg-gray-100 text-gray-700 font-bold rounded-2xl hover:bg-gray-200">➕ ลงทะเบียนเพิ่ม</button>
            </div>
        </div>
    </div>

    <div id="adminView" class="max-w-4xl mx-auto px-4 relative z-10 hidden">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="flex border-b bg-gray-50">
                <button onclick="switchAdminTab('list')" id="tabBtn-list" class="flex-1 py-4 font-bold active-tab">📋 รายชื่อ</button>
                <button onclick="switchAdminTab('manage')" id="tabBtn-manage" class="flex-1 py-4 font-bold text-gray-400">🏷️ จัดการกิจกรรม</button>
            </div>

            <div id="adminTab-list" class="p-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                    <input type="text" id="filterSearch" oninput="renderHistoryList()" placeholder="🔍 ค้นหาชื่อ/เบอร์..." class="px-4 py-3 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <select id="filterActivity" onchange="renderHistoryList()" class="px-4 py-3 border rounded-xl outline-none"></select>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-50 text-gray-500 uppercase tracking-wider">
                            <tr>
                                <th class="p-4">#</th>
                                <th class="p-4">ชื่อ-นามสกุล</th>
                                <th class="p-4">เบอร์โทร</th>
                                <th class="p-4">กิจกรรม</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody" class="divide-y"></tbody>
                    </table>
                </div>
            </div>

            <div id="adminTab-manage" class="p-6 hidden">
                <div class="bg-indigo-50 p-6 rounded-2xl mb-8 border border-indigo-100">
                    <h4 class="font-bold text-indigo-900 mb-4">🚀 เพิ่มกิจกรรมใหม่</h4>
                    <div class="flex flex-wrap gap-3">
                        <input type="text" id="newActInput" class="flex-1 min-w-[200px] px-4 py-3 border rounded-xl outline-none" placeholder="ชื่อกิจกรรม...">
                        <input type="color" id="newActColor" value="#6366f1" class="w-14 h-12 p-1 rounded-xl border cursor-pointer bg-white">
                        <button onclick="addActivity()" class="px-8 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-md">เพิ่ม</button>
                    </div>
                </div>
                <div id="adminActList" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
            
            <div class="p-6 bg-gray-50 border-t text-center">
                <button onclick="location.reload()" class="text-red-500 font-bold hover:underline">🚪 ออกจากโหมดผู้ดูแล</button>
            </div>
        </div>
    </div>

    <div id="searchModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-end">
        <div class="bg-white rounded-t-[2.5rem] w-full p-8 max-h-[85vh] overflow-y-auto animate-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">🔍 ค้นหาประวัติการจอง</h3>
                <button onclick="toggleSearchModal(false)" class="p-2 bg-gray-100 rounded-full">✕</button>
            </div>
            <input type="tel" oninput="handleSearch(this.value)" placeholder="กรอกเบอร์โทรศัพท์..." class="w-full px-6 py-4 bg-gray-50 rounded-2xl border-none outline-none ring-2 ring-gray-100 focus:ring-indigo-500 text-lg mb-6">
            <div id="searchResults" class="space-y-4 pb-10"></div>
        </div>
    </div>

    <div id="adminLoginModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl animate-in text-center">
            <h3 class="text-xl font-bold mb-6">ผู้ดูแลระบบ 🔐</h3>
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน" class="w-full px-4 py-4 border rounded-xl mb-6 text-center text-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex gap-3">
                <button onclick="toggleAdminLogin(false)" class="flex-1 py-3 text-gray-400">ปิด</button>
                <button onclick="checkAdminPassword()" class="flex-1 py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script>
        const YOUR_LIFF_ID = "2008940385-theIq9K7";
        const YOUR_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec";

        // แม่แบบกิจกรรมเริ่มต้น
        const defaultOptions = {
            'act1': { label: 'ธรรมยาตรา 🚶', color: '#6366f1', list: ['วัดพระธรรมกาย', 'อนุสรณ์สถาน'] },
            'act2': { label: 'จุดประทีป ✨', color: '#f59e0b', list: ['ลานธรรม', 'มหาเจดีย์'] }
        };

        let currentConfig = JSON.parse(localStorage.getItem('merit_config')) || defaultOptions;
        let liffProfile = {};

        async function initApp() {
            try {
                await liff.init({ liffId: YOUR_LIFF_ID });
                if (liff.isLoggedIn()) {
                    liffProfile = await liff.getProfile();
                    document.getElementById('userNameDisplay').textContent = liffProfile.displayName;
                } else {
                    liff.login();
                }
            } catch (err) { console.error('LIFF Error', err); }
            updateDropdowns();
        }

        function updateDropdowns() {
            const select = document.getElementById('activity');
            const filterSelect = document.getElementById('filterActivity');
            const keys = Object.keys(currentConfig);
            
            select.innerHTML = '<option value="" disabled selected>-- เลือกกิจกรรม --</option>' + 
                keys.map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
            
            filterSelect.innerHTML = '<option value="">ทั้งหมด</option>' + 
                keys.map(k => `<option value="${currentConfig[k].label}">${currentConfig[k].label}</option>`).join('');
        }

        document.getElementById('activity').onchange = function() {
            const sub = document.getElementById('subOption');
            const data = currentConfig[this.value];
            if (data && data.list.length > 0) {
                sub.innerHTML = data.list.map(t => `<option value="${t}">${t}</option>`).join('');
                document.getElementById('subOptionContainer').classList.remove('hidden');
            } else {
                document.getElementById('subOptionContainer').classList.add('hidden');
            }
        };

        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            const actKey = document.getElementById('activity').value;
            const config = currentConfig[actKey];
            const data = {
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                activity: config.label,
                subOption: document.getElementById('subOption').value || '-',
                displayName: liffProfile.displayName || 'Guest'
            };

            try {
                await fetch(YOUR_WEBAPP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    body: JSON.stringify(data)
                });

                document.getElementById('sumName').textContent = data.fullname;
                document.getElementById('sumAct').textContent = data.activity;
                document.getElementById('sumAct').style.color = config.color;
                document.getElementById('sumSub').textContent = data.subOption;
                document.getElementById('summaryColorBar').style.backgroundColor = config.color;

                const history = JSON.parse(localStorage.getItem('merit_history') || '[]');
                history.unshift(data);
                localStorage.setItem('merit_history', JSON.stringify(history));

                this.classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');
            } catch (err) { alert('ขออภัย บันทึกไม่สำเร็จ'); }
            document.getElementById('loadingOverlay').style.display = 'none';
        };

        function resetRegistrationForm() {
            document.getElementById('meritForm').reset();
            document.getElementById('meritForm').classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            document.getElementById('subOptionContainer').classList.add('hidden');
        }

        // Search & Admin Logic
        function toggleSearchModal(s) { document.getElementById('searchModal').classList.toggle('hidden', !s); }
        function handleSearch(q) {
            const res = document.getElementById('searchResults');
            const history = JSON.parse(localStorage.getItem('merit_history') || '[]');
            const filtered = history.filter(h => h.phone.includes(q));
            res.innerHTML = q.length < 5 ? '<p class="text-center text-gray-400 py-10">กรอกอย่างน้อย 5 หลัก</p>' : 
                filtered.map(h => `<div class="p-4 bg-gray-50 rounded-2xl border-l-4 border-indigo-500 shadow-sm">
                    <div class="font-bold text-gray-800">${h.fullname}</div>
                    <div class="text-xs text-gray-400">${h.activity} - ${h.subOption}</div>
                </div>`).join('') || '<p class="text-center text-gray-400 py-10">ไม่พบข้อมูล</p>';
        }

        function toggleAdminLogin(s) { document.getElementById('adminLoginModal').classList.toggle('hidden', !s); }
        function checkAdminPassword() {
            if (document.getElementById('adminPassword').value === '1234') {
                toggleAdminLogin(false);
                document.getElementById('userView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
                switchAdminTab('list');
            } else { alert('รหัสผ่านไม่ถูกต้อง'); }
        }

        function switchAdminTab(t) {
            document.getElementById('adminTab-list').classList.toggle('hidden', t !== 'list');
            document.getElementById('adminTab-manage').classList.toggle('hidden', t !== 'manage');
            document.getElementById('tabBtn-list').className = t === 'list' ? 'flex-1 py-4 font-bold active-tab' : 'flex-1 py-4 font-bold text-gray-400';
            document.getElementById('tabBtn-manage').className = t === 'manage' ? 'flex-1 py-4 font-bold active-tab' : 'flex-1 py-4 font-bold text-gray-400';
            if(t === 'list') renderHistoryList();
            if(t === 'manage') renderAdminPanel();
        }

        function renderAdminPanel() {
            const listDiv = document.getElementById('adminActList');
            listDiv.innerHTML = Object.keys(currentConfig).map(k => `
                <div class="bg-white border rounded-2xl overflow-hidden shadow-sm">
                    <div class="p-4 text-white flex justify-between items-center" style="background-color: ${currentConfig[k].color}">
                        <span class="font-bold">${currentConfig[k].label}</span>
                        <button onclick="deleteActivity('${k}')" class="p-1 hover:bg-white/20 rounded-lg">✕</button>
                    </div>
                    <div class="p-4 space-y-2">
                        ${currentConfig[k].list.map((item, i) => `<div class="flex justify-between text-xs bg-gray-50 p-2 rounded"><span>${item}</span><button onclick="removeItem('${k}', ${i})" class="text-red-400">ลบ</button></div>`).join('')}
                    </div>
                    <div class="p-4 border-t flex gap-2">
                        <input type="text" id="in-${k}" class="flex-1 text-xs border rounded px-2 py-1" placeholder="เพิ่มรายการ...">
                        <button onclick="addItem('${k}')" class="bg-indigo-600 text-white px-3 py-1 rounded text-xs">เพิ่ม</button>
                    </div>
                </div>`).join('');
        }

        function addActivity() {
            const n = document.getElementById('newActInput').value.trim();
            const c = document.getElementById('newActColor').value;
            if(!n) return;
            const id = 'act_' + Date.now();
            currentConfig[id] = { label: n, color: c, list: [] };
            saveConfig();
        }
        function addItem(k) { 
            const i = document.getElementById('in-'+k); 
            if(i.value) { currentConfig[k].list.push(i.value); saveConfig(); }
        }
        function removeItem(k, i) { currentConfig[k].list.splice(i, 1); saveConfig(); }
        function deleteActivity(k) { if(confirm('ลบกิจกรรมนี้?')) { delete currentConfig[k]; saveConfig(); } }
        function saveConfig() { localStorage.setItem('merit_config', JSON.stringify(currentConfig)); renderAdminPanel(); updateDropdowns(); }

        function renderHistoryList() {
            const h = JSON.parse(localStorage.getItem('merit_history') || '[]');
            const s = document.getElementById('filterSearch').value.toLowerCase();
            const a = document.getElementById('filterActivity').value;
            document.getElementById('historyTableBody').innerHTML = h.filter(x => 
                (x.fullname.toLowerCase().includes(s) || x.phone.includes(s)) && (!a || x.activity === a)
            ).map((x, i) => `<tr><td class="p-4 text-gray-400">${i+1}</td><td class="p-4 font-bold">${x.fullname}</td><td class="p-4">${x.phone}</td><td class="p-4 text-indigo-600 font-bold">${x.activity}</td></tr>`).join('') || '<tr><td colspan="4" class="p-10 text-center text-gray-400">ไม่พบข้อมูล</td></tr>';
        }

        window.onload = initApp;
    </script>
</body>
</html>
