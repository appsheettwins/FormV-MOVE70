<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-MOVE 🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .admin-gradient { background: linear-gradient(135deg, #00dbde 0%, #fc00ff 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600 animate-pulse" id="loadingText">กำลังดำเนินการ... 🚗</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-center">
                <button onclick="toggleAdminLogin(true)" class="glass-effect p-3 rounded-2xl hover:bg-white/30 transition-all">🛠️</button>
                <div>
                    <h1 class="text-2xl font-bold">V-MOVE 🚗</h1>
                    <p class="text-sm text-yellow-300">สวัสดีคุณ <span id="userNameDisplay" class="font-bold">...</span> 🙏</p>
                </div>
            </div>
            <button onclick="toggleSearchModal(true)" class="glass-effect p-3 rounded-2xl">🔍</button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form id="meritForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 ml-1 mb-1">👦 ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="ระบุชื่อผู้จอง">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 ml-1 mb-1">📞 เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required maxlength="10" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="08XXXXXXXX">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 ml-1 mb-1">🗓️ เลือกกิจกรรม</label>
                    <select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white focus:ring-2 focus:ring-indigo-500" onchange="updateSubOptions()"></select>
                </div>
                <div id="subContainer" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 ml-1 mb-1">📍 จุดรับ/รายละเอียด</label>
                    <select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50 focus:ring-2 focus:ring-indigo-500"></select>
                </div>
                <button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all mt-4">✨ ยืนยันการจอง</button>
            </form>

            <div id="successView" class="hidden text-center py-4 animate-in">
                <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-4xl">✓</div>
                <h3 class="text-2xl font-bold text-green-600 mb-2">ลงทะเบียนสำเร็จ!</h3>
                <div id="bookingSummary" class="bg-gray-50 rounded-2xl p-5 mb-8 text-left border-l-8 border-indigo-500 space-y-2"></div>
                <button onclick="location.reload()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-600 hover:bg-gray-200 transition-all">➕ จองเพิ่มอีกรายการ</button>
            </div>
        </div>
    </div>

    <div id="adminView" class="max-w-5xl mx-auto px-4 relative z-10 hidden pt-6">
        <div class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100 animate-in">
            <div class="admin-gradient p-6 text-white flex justify-between items-center px-8 shadow-lg">
                <div class="flex items-center gap-3">
                    <span class="text-2xl">⚡</span>
                    <h2 class="text-xl font-bold tracking-wide">รายชื่อผู้ลงทะเบียน V-MOVE</h2>
                </div>
                <button onclick="location.reload()" class="glass-effect px-5 py-2 rounded-xl text-sm font-bold hover:bg-white/30 transition-all">🚪 ออก</button>
            </div>

            <div class="p-6 space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 bg-gray-50 p-6 rounded-3xl border border-gray-100">
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1 ml-1 uppercase">ค้นหา</label>
                        <input type="text" id="adminSearchInput" oninput="filterAdminHistory()" class="w-full p-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-400" placeholder="ชื่อ/เบอร์...">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1 ml-1 uppercase">กรองกิจกรรม</label>
                        <select id="filterAct" onchange="filterAdminHistory()" class="w-full p-3 rounded-xl border border-gray-200 outline-none"></select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-400 mb-1 ml-1 uppercase">สถานะ</label>
                        <div class="p-3 text-green-600 font-bold bg-white rounded-xl border border-green-50 text-center text-sm">ONLINE ✅</div>
                    </div>
                    <div class="flex items-center justify-center bg-white rounded-2xl border-2 border-indigo-100 p-2 shadow-sm">
                        <div class="text-center">
                            <span class="text-xs font-bold text-gray-400 block uppercase tracking-tighter">ยอดรวม</span>
                            <span id="summaryCount" class="text-3xl font-black text-indigo-600">0</span>
                        </div>
                    </div>
                </div>

                <div class="overflow-x-auto rounded-2xl border border-gray-100">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-gray-800 text-white">
                            <tr>
                                <th class="p-4">ชื่อ-นามสกุล</th>
                                <th class="p-4">เบอร์โทร</th>
                                <th class="p-4">กิจกรรม</th>
                                <th class="p-4">จุดรับ/รายละเอียด</th>
                            </tr>
                        </thead>
                        <tbody id="adminHistoryBody" class="divide-y divide-gray-100 bg-white"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="adminLoginModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-6 text-gray-800">รหัสแอดมิน 🔐</h3>
            <input type="password" id="adminPass" class="w-full px-4 py-4 border rounded-xl mb-6 text-center text-3xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••">
            <div class="flex gap-3">
                <button onclick="toggleAdminLogin(false)" class="flex-1 py-3 text-gray-400 font-bold">ยกเลิก</button>
                <button onclick="checkAdmin()" class="flex-1 py-3 gradient-bg text-white rounded-xl font-bold">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <div id="searchModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-end">
        <div class="bg-white rounded-t-[2.5rem] w-full p-8 max-h-[90vh] overflow-y-auto animate-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-800">🔍 ค้นหาการจอง</h3>
                <button onclick="toggleSearchModal(false)" class="p-2 bg-gray-100 rounded-full text-gray-400">✕</button>
            </div>
            <input type="tel" id="searchPhone" oninput="runSearch()" placeholder="ใส่เบอร์โทรศัพท์..." class="w-full px-6 py-5 bg-gray-50 rounded-2xl outline-none ring-2 ring-gray-100 focus:ring-indigo-500 mb-8 text-xl">
            <div id="searchResults" class="space-y-4 pb-12"></div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec"; 

        let currentConfig = {};
        let allBookingData = []; 
        let liffProfile = {};

        async function initApp() {
            showLoading(true, "กำลังซิงค์ระบบ... 🚀");
            try {
                await loadGlobalConfig();
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    liffProfile = await liff.getProfile();
                    document.getElementById('userNameDisplay').textContent = liffProfile.displayName;
                } else { liff.login(); }
            } catch (e) { console.error(e); } finally { showLoading(false); }
        }

        async function loadGlobalConfig() {
            const res = await fetch(`${API_URL}?action=getConfig&t=${new Date().getTime()}`);
            currentConfig = await res.json();
            const sel = document.getElementById('activity');
            const options = Object.keys(currentConfig).map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
            sel.innerHTML = '<option value="" disabled selected>-- เลือกกิจกรรม --</option>' + options;
        }

        function updateSubOptions() {
            const val = document.getElementById('activity').value;
            const sub = document.getElementById('subOption');
            const data = currentConfig[val];
            if (data && data.list && data.list.length > 0) {
                sub.innerHTML = data.list.map(t => `<option value="${t}">${t}</option>`).join('');
                document.getElementById('subContainer').classList.remove('hidden');
            } else { document.getElementById('subContainer').classList.add('hidden'); }
        }

        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            showLoading(true, "กำลังจอง... 🚗");
            const actKey = document.getElementById('activity').value;
            const data = { 
                action: 'register', 
                userId: liffProfile.userId || 'Guest', 
                displayName: liffProfile.displayName || 'Guest', 
                fullname: document.getElementById('fullname').value, 
                phone: document.getElementById('phone').value, 
                activity: currentConfig[actKey].label, 
                subOption: document.getElementById('subOption').value || '-',
                pictureUrl: liffProfile.pictureUrl || '' 
            };
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                const history = JSON.parse(localStorage.getItem('vmove_history') || '[]');
                history.unshift(data);
                localStorage.setItem('vmove_history', JSON.stringify(history));
                document.getElementById('bookingSummary').innerHTML = `<p><b>👤 ผู้จอง:</b> ${data.fullname}</p><p><b>🗓️ กิจกรรม:</b> ${data.activity}</p><p><b>📍 จุดรับ:</b> ${data.subOption}</p>`;
                document.getElementById('meritForm').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
            } catch(e) { alert('จองไม่สำเร็จ'); } finally { showLoading(false); }
        };

        // --- Admin Logic ---
        async function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if (pass === '1129') {
                showLoading(true, "กำลังโหลดรายชื่อ... 🔄");
                toggleAdminLogin(false);
                try {
                    const res = await fetch(`${API_URL}?action=read&t=${new Date().getTime()}`);
                    const data = await res.json();
                    allBookingData = data.results || [];
                    document.getElementById('userView').classList.add('hidden');
                    document.getElementById('appHeader').classList.add('hidden');
                    document.getElementById('adminView').classList.remove('hidden');
                    
                    const fAct = document.getElementById('filterAct');
                    const acts = [...new Set(allBookingData.map(i => i.activity))];
                    fAct.innerHTML = '<option value="all">ทั้งหมด</option>' + acts.map(a => `<option value="${a}">${a}</option>`).join('');
                    filterAdminHistory();
                } catch (e) { alert('โหลดไม่สำเร็จ'); } finally { showLoading(false); }
            } else { alert('รหัสผิด'); }
        }

        function filterAdminHistory() {
            const selAct = document.getElementById('filterAct').value;
            const q = document.getElementById('adminSearchInput').value.toLowerCase();
            const filtered = allBookingData.filter(h => (selAct === 'all' || h.activity === selAct) && (h.fullname.toLowerCase().includes(q) || h.phone.includes(q)));
            document.getElementById('summaryCount').textContent = filtered.length;
            document.getElementById('adminHistoryBody').innerHTML = filtered.map(h => `
                <tr class="hover:bg-gray-50 transition-colors">
                    <td class="p-4 font-bold text-gray-700">${h.fullname}</td>
                    <td class="p-4">${h.phone}</td>
                    <td class="p-4"><span class="px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 font-bold text-xs">${h.activity}</span></td>
                    <td class="p-4 text-gray-500">${h.subOption}</td>
                </tr>`).join('');
        }

        function runSearch() {
            const q = document.getElementById('searchPhone').value;
            const history = JSON.parse(localStorage.getItem('vmove_history') || '[]');
            const filtered = history.filter(h => h.phone.includes(q));
            document.getElementById('searchResults').innerHTML = filtered.length ? filtered.map(h => `<div class="p-6 bg-gray-50 rounded-[2rem] border-l-[10px] border-indigo-500 animate-in"><div class="text-xl font-bold">${h.fullname}</div><div class="text-indigo-600 font-medium">${h.activity}</div><div class="text-sm text-gray-500">${h.subOption}</div></div>`).join('') : '<p class="text-center text-gray-400 py-10">ไม่พบข้อมูลในเครื่องนี้</p>';
        }

        function showLoading(s, t) { document.getElementById('loadingText').textContent = t; document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function toggleAdminLogin(s) { document.getElementById('adminLoginModal').classList.toggle('hidden', !s); }
        function toggleSearchModal(s) { document.getElementById('searchModal').classList.toggle('hidden', !s); }

        window.onload = initApp;
    </script>
</body>
</html>
