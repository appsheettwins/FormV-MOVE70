<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนกิจกรรมบุญ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style id="live-styles">
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { border-bottom: 3px solid #6366f1; color: #4338ca; }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:10000; align-items:center; justify-content:center; flex-direction: column; }
        /* แก้ไขปัญหาฟิล์มดำค้าง */
        .modal-backdrop { pointer-events: none; opacity: 0; transition: opacity 0.3s ease; }
        .modal-backdrop.active { pointer-events: auto; opacity: 1; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600">กำลังประมวลผล...</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-start">
                <button id="adminLoginBtn" onclick="toggleAdminLogin(true)" class="glass-effect p-3 rounded-2xl hover:bg-white/30 hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                </button>
                <div>
                    <h1 class="text-2xl font-bold">ลงทะเบียนร่วมบุญ</h1>
                    <p class="opacity-90 font-light text-xs text-yellow-200">สวัสดีคุณ <span id="userNameDisplay">...</span></p>
                </div>
            </div>
            <button onclick="toggleSearchModal(true)" class="glass-effect p-3 rounded-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
            </button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div id="mainContentCard" class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form id="meritForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="st-label text-sm font-medium text-gray-700 ml-1">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="ระบุชื่อ">
                </div>
                <div class="space-y-2">
                    <label class="st-label text-sm font-medium text-gray-700 ml-1">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required maxlength="10" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="08xxxxxxxx">
                </div>
                <div class="space-y-2">
                    <label class="st-label text-sm font-medium text-gray-700 ml-1">กิจกรรม</label>
                    <select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white"></select>
                </div>
                <div id="subContainer" class="hidden space-y-2">
                    <label class="st-label text-sm font-medium text-gray-700 ml-1">รายละเอียด</label>
                    <select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50"></select>
                </div>
                <button type="submit" id="st-submitBtn" class="w-full gradient-bg text-white font-semibold py-4 rounded-2xl shadow-lg active:scale-95 text-lg">ลงทะเบียน</button>
            </form>

            <div id="successView" class="hidden text-center py-4">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500 text-4xl">✓</div>
                <h3 id="st-successHeader" class="font-bold text-gray-800 mb-6">บันทึกสำเร็จ</h3>
                <div id="st-summaryCard" class="bg-gray-50 rounded-2xl p-6 text-left relative overflow-hidden mb-6 border border-gray-100">
                    <div id="sumBar" class="absolute left-0 top-0 bottom-0 w-2 bg-indigo-500"></div>
                    <p id="st-summaryInfo" class="text-gray-600">
                        <span id="sumName" class="font-bold block text-lg">ทดสอบ 1</span>
                        <span id="sumDetail">ธรรมยาตรา - 5 ม.ค. - อนุสรณ์สถานมหาวิหาร</span>
                    </p>
                </div>
                <button onclick="location.reload()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-600">กลับหน้าหลัก</button>
            </div>
        </div>
    </div>

    <div id="adminView" class="max-w-5xl mx-auto px-4 py-6 relative z-30 hidden">
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
            <div class="flex border-b bg-gray-50 overflow-x-auto">
                <button onclick="switchTab('list')" id="t-list" class="px-8 py-5 font-bold active-tab">รายชื่อ</button>
                <button onclick="switchTab('manage')" id="t-manage" class="px-8 py-5 font-bold text-gray-400">กิจกรรม</button>
                <button onclick="switchTab('style')" id="t-style" class="px-8 py-5 font-bold text-gray-400">ปรับแต่งดีไซน์ 🎨</button>
            </div>

            <div id="tab-list" class="p-6">
                <div class="flex gap-4 mb-4">
                    <input type="text" id="admSearch" oninput="renderHistory()" placeholder="ค้นหา..." class="border p-2 rounded-lg flex-1">
                </div>
                <div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="bg-gray-50"><tr><th class="p-3">ชื่อ</th><th class="p-3">เบอร์</th><th class="p-3">กิจกรรม</th></tr></thead><tbody id="admTableBody" class="divide-y"></tbody></table></div>
            </div>

            <div id="tab-manage" class="p-6 hidden">
                <div class="bg-indigo-50 p-6 rounded-2xl mb-6 flex flex-wrap gap-4 items-end">
                    <input type="text" id="newActName" placeholder="ชื่อกิจกรรมใหม่" class="border p-2 rounded-xl flex-1">
                    <input type="color" id="newActColor" value="#6366f1" class="h-10 w-16 p-1 bg-white border rounded-xl">
                    <button onclick="addActivity()" class="bg-indigo-600 text-white px-6 py-2 rounded-xl font-bold">เพิ่มกิจกรรม</button>
                </div>
                <div id="actGrid" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>

            <div id="tab-style" class="p-6 hidden">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-gray-50 p-6 rounded-2xl space-y-6">
                        <label class="block font-bold">1. เลือกหน้า</label>
                        <select id="style-page" onchange="togglePreviewPage()" class="w-full border p-3 rounded-xl">
                            <option value="form">หน้าฟอร์มกรอกข้อมูล</option>
                            <option value="success">หน้าสรุปข้อมูล (Success)</option>
                        </select>
                        <label class="block font-bold">2. เลือกส่วนที่จะแก้</label>
                        <select id="style-target" onchange="loadTargetStyles()" class="w-full border p-3 rounded-xl bg-white"></select>
                        <div class="space-y-4 pt-4 border-t">
                            <div class="flex justify-between"><span>ขนาด</span><input type="range" id="val-size" min="12" max="50" oninput="updateLivePreview()" class="w-32"></div>
                            <div class="flex justify-between"><span>สี</span><input type="color" id="val-color" oninput="updateLivePreview()"></div>
                            <div class="flex justify-between"><span>ความหนา</span>
                                <select id="val-weight" onchange="updateLivePreview()" class="border p-1 rounded">
                                    <option value="300">บาง</option><option value="400">ปกติ</option><option value="600">หนา</option><option value="800">หนามาก</option>
                                </select>
                            </div>
                        </div>
                        <button onclick="saveStyles()" class="w-full bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg mt-4">บันทึกการตั้งค่า</button>
                    </div>

                    <div class="border-2 border-dashed border-gray-200 rounded-3xl p-6 bg-white">
                        <div id="preview-form" class="space-y-4 scale-90">
                            <label class="pv-st-label block font-medium">ชื่อ-นามสกุล</label>
                            <input type="text" disabled class="w-full border p-3 rounded-xl">
                            <button id="pv-st-submitBtn" class="w-full gradient-bg text-white py-3 rounded-xl font-bold">ปุ่มส่งข้อมูล</button>
                        </div>
                        <div id="preview-success" class="hidden text-center scale-90">
                            <h3 id="pv-st-successHeader" class="font-bold">บันทึกสำเร็จ</h3>
                            <div id="pv-st-summaryCard" class="bg-gray-50 rounded-xl p-4 border mt-4">
                                <div id="pv-st-summaryInfo"><b>ทดสอบ 1</b><br><small>กิจกรรมตัวอย่าง</small></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-4 bg-gray-50 border-t text-center">
                <button onclick="location.reload()" class="text-red-500 font-bold">ออกจากโหมด Admin</button>
            </div>
        </div>
    </div>

    <div id="adminLoginModal" class="fixed inset-0 bg-black/60 z-[1000] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl relative">
            <h3 class="text-xl font-bold mb-6 text-center">Admin Login</h3>
            <input type="password" id="admPass" class="w-full px-4 py-3 border rounded-xl mb-4 text-center outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex gap-3">
                <button onclick="toggleAdminLogin(false)" class="flex-1 py-3 text-gray-500">ยกเลิก</button>
                <button onclick="checkAdmin()" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl">ตกลง</button>
            </div>
        </div>
    </div>

    <div id="searchModal" class="fixed inset-0 bg-black/60 z-[1000] hidden flex flex-col justify-end">
        <div class="bg-white rounded-t-[2.5rem] p-8 max-h-[80vh] overflow-y-auto">
             <div class="flex justify-between mb-4"><h3 class="text-xl font-bold">ค้นหา</h3><button onclick="toggleSearchModal(false)">✕</button></div>
             <input type="tel" oninput="searchHistory(this.value)" placeholder="เบอร์โทร..." class="w-full p-4 bg-gray-100 rounded-2xl mb-4">
             <div id="searchResultArea" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec";

        let currentConfig = JSON.parse(localStorage.getItem('merit_config')) || {
            'act1': { label: 'ธรรมยาตรา', color: '#6366f1', list: ['2 ม.ค. - วัดพระธรรมกาย'] }
        };

        let uiStyles = JSON.parse(localStorage.getItem('merit_ui_full_style')) || {
            'st-label': { color: '#374151', size: '14px', weight: '500' },
            'st-submitBtn': { color: '#ffffff', size: '18px', weight: '600' },
            'st-successHeader': { color: '#1f2937', size: '24px', weight: '700' },
            'st-summaryCard': { color: '#f9fafb', size: '14px', weight: '400' },
            'st-summaryInfo': { color: '#4b5563', size: '16px', weight: '400' }
        };

        const targetNames = {
            'form': { 'st-label': 'หัวข้อ (Label)', 'st-submitBtn': 'ปุ่มลงทะเบียน' },
            'success': { 'st-successHeader': 'หัวข้อ "สำเร็จ"', 'st-summaryCard': 'สีพื้นหลังสรุป', 'st-summaryInfo': 'ข้อความสรุปรายชื่อ' }
        };

        async function init() {
            if (/Chrome/.test(navigator.userAgent)) document.getElementById('adminLoginBtn').classList.remove('hidden');
            applyGlobalStyles();
            togglePreviewPage();
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const p = await liff.getProfile();
                    document.getElementById('userNameDisplay').textContent = p.displayName;
                } else liff.login();
            } catch(e){}
            renderOptions();
        }

        function applyGlobalStyles() {
            let css = "";
            Object.keys(uiStyles).forEach(id => {
                const s = uiStyles[id];
                if (id === 'st-summaryCard') {
                    css += `#st-summaryCard { background-color: ${s.color} !important; }`;
                    css += `#pv-st-summaryCard { background-color: ${s.color} !important; }`;
                } else if (id === 'st-label') {
                    css += `.st-label { color: ${s.color} !important; font-size: ${s.size} !important; font-weight: ${s.weight} !important; }`;
                    css += `.pv-st-label { color: ${s.color} !important; font-size: ${s.size} !important; font-weight: ${s.weight} !important; }`;
                } else {
                    css += `#${id} { color: ${s.color} !important; font-size: ${s.size} !important; font-weight: ${s.weight} !important; }`;
                    css += `#pv-${id} { color: ${s.color} !important; font-size: ${s.size} !important; font-weight: ${s.weight} !important; }`;
                }
            });
            document.getElementById('live-styles').innerHTML += css;
        }

        function togglePreviewPage() {
            const page = document.getElementById('style-page').value;
            const targetSelect = document.getElementById('style-target');
            document.getElementById('preview-form').classList.toggle('hidden', page !== 'form');
            document.getElementById('preview-success').classList.toggle('hidden', page !== 'success');
            targetSelect.innerHTML = Object.keys(targetNames[page]).map(id => `<option value="${id}">${targetNames[page][id]}</option>`).join('');
            loadTargetStyles();
        }

        function loadTargetStyles() {
            const id = document.getElementById('style-target').value;
            const s = uiStyles[id];
            document.getElementById('val-size').value = parseInt(s.size);
            document.getElementById('val-color').value = s.color;
            document.getElementById('val-weight').value = s.weight;
        }

        function updateLivePreview() {
            const id = document.getElementById('style-target').value;
            const size = document.getElementById('val-size').value + 'px';
            const color = document.getElementById('val-color').value;
            const weight = document.getElementById('val-weight').value;
            const el = document.getElementById('pv-' + id);
            if (id === 'st-summaryCard') { el.style.backgroundColor = color; }
            else if (id === 'st-label') { document.querySelectorAll('.pv-st-label').forEach(l => { l.style.color = color; l.style.fontSize = size; l.style.fontWeight = weight; }); }
            else { el.style.color = color; el.style.fontSize = size; el.style.fontWeight = weight; }
        }

        function saveStyles() {
            const id = document.getElementById('style-target').value;
            uiStyles[id] = { size: document.getElementById('val-size').value + 'px', color: document.getElementById('val-color').value, weight: document.getElementById('val-weight').value };
            localStorage.setItem('merit_ui_full_style', JSON.stringify(uiStyles));
            alert('บันทึกดีไซน์แล้ว');
            location.reload();
        }

        // --- Helper Functions (Fix Modal Block) ---
        function toggleAdminLogin(show) {
            const modal = document.getElementById('adminLoginModal');
            modal.classList.toggle('hidden', !show);
            if(!show) document.getElementById('admPass').value = '';
        }

        function checkAdmin() { 
            if(document.getElementById('admPass').value === '1234') {
                toggleAdminLogin(false);
                document.getElementById('appHeader').classList.add('hidden');
                document.getElementById('userView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
            } else alert('รหัสผ่านไม่ถูกต้อง');
        }

        function toggleSearchModal(show) {
            document.getElementById('searchModal').classList.toggle('hidden', !show);
        }

        function renderOptions() {
            const sel = document.getElementById('activity');
            const opt = Object.keys(currentConfig).map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
            sel.innerHTML = '<option value="" disabled selected>เลือกกิจกรรม</option>' + opt;
        }

        document.getElementById('activity').onchange = function() {
            const sub = document.getElementById('subOption');
            const data = currentConfig[this.value];
            sub.innerHTML = data.list.map(i => `<option value="${i}">${i}</option>`).join('');
            document.getElementById('subContainer').classList.remove('hidden');
        };

        window.onload = init;
    </script>
</body>
</html>
