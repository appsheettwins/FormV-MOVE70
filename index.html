<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-MOVE Booking 🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .active-tab { border-bottom: 4px solid #6366f1; color: #4338ca; background: rgba(99, 102, 241, 0.05); }
        #loadingOverlay { display:flex; position:fixed; inset:0; background:rgba(255,255,255,0.9); z-index:10000; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600 animate-pulse">กำลังโหลดข้อมูล V-MOVE... 🚗</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-center">
                <button id="adminLoginBtn" onclick="toggleAdminLogin(true)" class="bg-white/20 p-3 rounded-2xl hidden">🛠️</button>
                <h1 id="txt-main-title" class="text-2xl font-bold">...</h1>
            </div>
            <button onclick="toggleSearchModal(true)" class="bg-white/20 p-3 rounded-2xl text-sm">🔍 ค้นหา</button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 min-h-[400px]">
            <form id="meritForm" class="space-y-6">
                <div><label id="lbl-fullname" class="block mb-2"></label><input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500"></div>
                <div><label id="lbl-phone" class="block mb-2"></label><input type="tel" id="phone" required maxlength="10" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none"></div>
                <div><label id="lbl-activity" class="block mb-2"></label><select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white" onchange="handleActivityChange(this.value)"></select></div>
                <div id="subContainer" class="hidden"><label id="lbl-detail" class="block mb-2"></label><select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50"></select></div>
                <button type="submit" id="st-submitBtn" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">ยืนยัน</button>
            </form>

            <div id="successView" class="hidden text-center py-6">
                <div class="text-6xl mb-4">🙏</div>
                <h3 id="st-successHeader" class="font-bold mb-6"></h3>
                <div id="st-summaryCard" class="rounded-2xl p-6 text-left relative overflow-hidden mb-6 border">
                    <div id="sumBar" class="absolute left-0 top-0 bottom-0 w-2 bg-indigo-500"></div>
                    <p id="txt-summary-title" class="text-xs uppercase font-bold text-gray-400 mb-2"></p>
                    <p id="sumName" class="font-bold text-lg text-gray-800"></p>
                    <p id="sumDetail" class="text-gray-600 mb-3"></p>
                    <p id="txt-summary-footer" class="text-xs border-t pt-2"></p>
                </div>
                <button onclick="location.reload()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-600">➕ สำรองที่นั่งเพิ่ม</button>
            </div>
        </div>
    </div>

    <div id="adminView" class="max-w-6xl mx-auto px-4 py-6 hidden relative z-30">
        <div class="gradient-bg p-6 rounded-t-[3rem] text-white flex justify-between items-center shadow-lg">
            <h2 class="text-2xl font-bold">Admin Manager 🛠️</h2>
            <button onclick="location.reload()" class="bg-white/20 px-4 py-2 rounded-xl font-bold">🚪 ออก</button>
        </div>
        <div class="bg-white rounded-b-3xl shadow-2xl flex flex-col md:flex-row border min-h-[600px]">
            <div class="w-full md:w-3/5 border-r border-gray-100">
                <div class="flex border-b bg-gray-50 overflow-x-auto">
                    <button onclick="switchTab('list')" id="t-list" class="px-6 py-4 font-bold active-tab whitespace-nowrap">📋 รายชื่อ</button>
                    <button onclick="switchTab('manage')" id="t-manage" class="px-6 py-4 font-bold text-gray-400 whitespace-nowrap">🏷️ กิจกรรม</button>
                    <button onclick="switchTab('form-design')" id="t-form-design" class="px-6 py-4 font-bold text-gray-400 whitespace-nowrap">📝 หน้าฟอร์ม</button>
                    <button onclick="switchTab('success-design')" id="t-success-design" class="px-6 py-4 font-bold text-gray-400 whitespace-nowrap">✅ หน้าสรุป</button>
                </div>
                <div class="p-6 max-h-[70vh] overflow-y-auto">
                    <div id="tab-list">
                        <input type="text" id="admSearch" oninput="renderHistory()" placeholder="🔍 ค้นหา..." class="w-full border p-3 rounded-xl mb-4 outline-none">
                        <table class="w-full text-sm text-left"><tbody id="admTableBody" class="divide-y"></tbody></table>
                    </div>
                    <div id="tab-manage" class="hidden space-y-4">
                        <div class="bg-indigo-50 p-6 rounded-2xl flex flex-col gap-3">
                            <input type="text" id="newActName" placeholder="🚀 ชื่อกิจกรรมใหม่" class="p-3 rounded-xl border">
                            <button onclick="addActivity()" class="bg-indigo-600 text-white py-3 rounded-xl font-bold">➕ เพิ่มกิจกรรม</button>
                        </div>
                        <div id="actGrid" class="space-y-4"></div>
                        <button onclick="saveActToCloud()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg">💾 บันทึกลง Sheet Activities</button>
                    </div>
                    <div id="tab-form-design" class="hidden space-y-3"><div id="editor-form"></div><button onclick="saveAllToCloud()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">💾 บันทึกลง Sheet Config</button></div>
                    <div id="tab-success-design" class="hidden space-y-3"><div id="editor-success"></div><button onclick="saveAllToCloud()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">💾 บันทึกลง Sheet Config</button></div>
                </div>
            </div>
            <div class="w-full md:w-2/5 bg-gray-50 p-6 flex justify-center items-start">
                <div class="sticky top-6 w-full max-w-[280px] bg-white rounded-[2.5rem] border-[6px] border-gray-800 shadow-2xl overflow-hidden min-h-[480px]">
                    <div class="h-6 w-full bg-gray-800"></div>
                    <div class="gradient-bg p-4 pt-6 text-white text-xs font-bold"><div id="pv-txt-main-title"></div></div>
                    <div class="p-4 -mt-4 bg-white rounded-t-3xl min-h-[400px]">
                        <div id="pv-form-area" class="space-y-3 pt-4">
                            <label id="pv-lbl-fullname" class="text-[10px] font-bold block"></label><div class="h-8 border rounded-lg bg-gray-50"></div>
                            <button id="pv-st-submitBtn" class="w-full py-2 gradient-bg text-white rounded-lg text-[10px] font-bold mt-4"></button>
                        </div>
                        <div id="pv-success-area" class="hidden text-center pt-10">
                            <div class="text-3xl mb-2">🙏</div><h3 id="pv-st-successHeader" class="text-[10px] font-bold px-2"></h3>
                            <div id="pv-st-summaryCard" class="border p-4 rounded-xl mt-4 text-left mx-2">
                                <p id="pv-txt-summary-title" class="text-[8px] font-bold text-gray-400"></p>
                                <div class="h-2 w-20 bg-gray-100 my-1"></div>
                                <p id="pv-txt-summary-footer" class="text-[8px] border-t pt-1 mt-2"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/70 hidden flex items-center justify-center z-[10000] backdrop-blur-sm">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-sm text-center mx-4">
            <h3 class="text-2xl font-bold mb-8">Admin Access 🔐</h3>
            <input type="password" id="admPass" class="w-full px-6 py-4 bg-gray-50 border rounded-2xl mb-6 text-center text-xl outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••">
            <div class="flex gap-3"><button onclick="toggleAdminLogin(false)" class="flex-1 font-bold text-gray-400">ปิด</button><button onclick="checkAdmin()" class="flex-1 py-4 gradient-bg text-white font-bold rounded-2xl shadow-xl">เข้าสู่ระบบ</button></div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7"; 
        const API_URL = "YOUR_WEB_APP_URL"; // *** สำคัญ: ต้องเปลี่ยนเป็น URL ที่ได้จากการ Deploy ***

        let masterSettings = {
            'txt-main-title': { text: '🚗 สำรองที่นั่ง V-MOVE🙏', color: '#ffffff', size: '24px', weight: '700' },
            'lbl-fullname': { text: '👤 ชื่อ-นามสกุล', color: '#374151', size: '14px', weight: '500' },
            'lbl-phone': { text: '📞 เบอร์โทรศัพท์', color: '#374151', size: '14px', weight: '500' },
            'lbl-activity': { text: '🗓️ เลือกกิจกรรม', color: '#374151', size: '14px', weight: '500' },
            'lbl-detail': { text: '📝 ระบุรายละเอียด', color: '#374151', size: '14px', weight: '500' },
            'st-submitBtn': { text: '✨ ยืนยันข้อมูล', color: '#ffffff', size: '18px', weight: '600' },
            'st-successHeader': { text: 'บันทึกสำเร็จ! รอการยืนยันทาง LINE 🙏', color: '#46c700', size: '20px', weight: '700' },
            'txt-summary-title': { text: '📜 รายละเอียดการลงทะเบียน', color: '#9ca3af', size: '12px', weight: '700' },
            'txt-summary-footer': { text: '* แคปหน้าจอนี้ไว้เป็นหลักฐาน', color: '#9ca3af', size: '11px', weight: '400' },
            'st-summaryCard': { text: 'สีพื้นหลัง', color: '#f9fafb', size: '0', weight: '0' }
        };

        let currentConfig = {};
        let registrationHistory = [];

        async function init() {
            if (/Chrome/.test(navigator.userAgent)) document.getElementById('adminLoginBtn').classList.remove('hidden');
            
            // Fast-load Timeout 3 วินาที
            const loadTask = loadCloudData();
            const timeoutTask = new Promise(resolve => setTimeout(resolve, 3000));
            await Promise.race([loadTask, timeoutTask]);
            
            toggleLoading(false);
            try { await liff.init({ liffId: LIFF_ID }); } catch(e){}
        }

        async function loadCloudData() {
            try {
                const res = await fetch(API_URL);
                const cloud = await res.json();
                if(cloud.settings && Object.keys(cloud.settings).length > 0) masterSettings = cloud.settings;
                if(cloud.activities) currentConfig = cloud.activities;
                registrationHistory = JSON.parse(localStorage.getItem('merit_history') || '[]');
                applyAllSettings(); renderOptions(); renderEditor(); renderHistory();
            } catch (e) { applyAllSettings(); renderEditor(); }
        }

        function applyAllSettings() {
            Object.keys(masterSettings).forEach(id => {
                const s = masterSettings[id];
                const el = document.getElementById(id);
                const pv = document.getElementById('pv-' + id);
                if (el && id !== 'st-summaryCard') {
                    el.innerText = s.text; el.style.color = s.color; el.style.fontSize = s.size; el.style.fontWeight = s.weight;
                }
                if (pv && id !== 'st-summaryCard') {
                    pv.innerText = s.text; pv.style.color = s.color; pv.style.fontSize = (parseInt(s.size) * 0.6) + 'px'; pv.style.fontWeight = s.weight;
                }
                if (id === 'st-summaryCard') {
                    document.getElementById('st-summaryCard').style.backgroundColor = s.color;
                    document.getElementById('pv-st-summaryCard').style.backgroundColor = s.color;
                }
            });
        }

        function renderEditor() {
            const createUI = (key) => {
                const s = masterSettings[key];
                return `<div class="bg-white border p-4 rounded-2xl shadow-sm space-y-3 mb-3">
                    <span class="text-[10px] font-bold text-gray-300 uppercase">${key}</span>
                    <input type="text" value="${s.text}" oninput="updateMaster('${key}', 'text', this.value)" class="w-full font-bold border-b outline-none text-sm">
                    <div class="flex gap-4 items-center text-xs">
                        🎨 <input type="color" value="${s.color}" oninput="updateMaster('${key}', 'color', this.value)" class="w-6 h-6 cursor-pointer">
                        📏 <input type="number" value="${parseInt(s.size)}" oninput="updateMaster('${key}', 'size', this.value + 'px')" class="w-10 border text-center"> px
                    </div>
                </div>`;
            };
            document.getElementById('editor-form').innerHTML = ['txt-main-title', 'lbl-fullname', 'lbl-phone', 'lbl-activity', 'lbl-detail', 'st-submitBtn'].map(createUI).join('');
            document.getElementById('editor-success').innerHTML = ['st-successHeader', 'txt-summary-title', 'txt-summary-footer', 'st-summaryCard'].map(createUI).join('');
        }

        function updateMaster(key, field, val) { masterSettings[key][field] = val; applyAllSettings(); }

        async function saveAllToCloud() {
            toggleLoading(true);
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'SAVE_ALL', settings: masterSettings }) });
                alert("✅ บันทึกหน้าฟอร์มแยกคอลัมน์สำเร็จ!");
            } catch(e) { alert("Error saving"); }
            toggleLoading(false);
        }

        // --- Activities ---
        function addActivity() {
            const name = document.getElementById('newActName').value;
            if(!name) return;
            const id = 'act' + Date.now();
            currentConfig[id] = { label: name, color: '#6366f1', list: [] };
            renderAdminActs(); document.getElementById('newActName').value = '';
        }

        function renderAdminActs() {
            document.getElementById('actGrid').innerHTML = Object.keys(currentConfig).map(k => `
                <div class="bg-white border rounded-2xl p-4 shadow-sm">
                    <div class="flex justify-between items-center mb-2"><span class="font-bold text-indigo-900">${currentConfig[k].label}</span><button onclick="delete currentConfig['${k}']; renderAdminActs();" class="text-red-400 font-bold">✕</button></div>
                    <div class="flex flex-wrap gap-2">
                        ${currentConfig[k].list.map((sub, idx) => `<span class="bg-gray-100 px-3 py-1 rounded-full text-xs flex items-center gap-2">${sub} <button onclick="currentConfig['${k}'].list.splice(${idx},1); renderAdminActs();" class="text-red-300">✕</button></span>`).join('')}
                        <button onclick="addSubItem('${k}')" class="text-indigo-600 text-xs font-bold">+ เพิ่มรายการย่อย</button>
                    </div>
                </div>
            `).join('');
        }

        function addSubItem(k) {
            const item = prompt("ระบุรายการย่อย:");
            if(item) { currentConfig[k].list.push(item); renderAdminActs(); }
        }

        async function saveActToCloud() {
            toggleLoading(true);
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'SAVE_ACT', activities: currentConfig }) });
            alert("✅ บันทึกกิจกรรมเรียบร้อย!");
            toggleLoading(false);
            renderOptions();
        }

        function renderOptions() {
            const sel = document.getElementById('activity');
            sel.innerHTML = '<option value="" disabled selected>เลือกกิจกรรม...</option>' + 
                Object.keys(currentConfig).map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
        }

        function handleActivityChange(val) {
            const sub = document.getElementById('subOption');
            const data = currentConfig[val];
            if(data && data.list && data.list.length > 0) {
                sub.innerHTML = data.list.map(i => `<option value="${i}">${i}</option>`).join('');
                document.getElementById('subContainer').classList.remove('hidden');
            } else { document.getElementById('subContainer').classList.add('hidden'); }
        }

        // --- Core ---
        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            toggleLoading(true);
            const actKey = document.getElementById('activity').value;
            const data = { fullname: document.getElementById('fullname').value, phone: document.getElementById('phone').value, activity: currentConfig[actKey].label, subOption: document.getElementById('subOption').value || '-' };
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                registrationHistory.unshift(data); localStorage.setItem('merit_history', JSON.stringify(registrationHistory));
                document.getElementById('sumName').textContent = data.fullname;
                document.getElementById('sumDetail').textContent = `${data.activity} ${data.subOption !== '-' ? '('+data.subOption+')' : ''}`;
                document.getElementById('meritForm').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
            } catch(e){ alert("Error"); }
            toggleLoading(false);
        };

        function switchTab(t) {
            ['list', 'manage', 'form-design', 'success-design'].forEach(tab => {
                document.getElementById('tab-'+tab).classList.toggle('hidden', tab !== t);
                document.getElementById('t-'+tab).className = tab === t ? 'px-6 py-4 font-bold active-tab whitespace-nowrap' : 'px-6 py-4 font-bold text-gray-400 whitespace-nowrap';
            });
            document.getElementById('pv-form-area').classList.toggle('hidden', t === 'success-design');
            document.getElementById('pv-success-area').classList.toggle('hidden', t !== 'success-design');
        }

        function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function toggleAdminLogin(s) { document.getElementById('loginModal').classList.toggle('hidden', !s); }
        function checkAdmin() { if(document.getElementById('admPass').value === '1234') { toggleAdminLogin(false); document.getElementById('appHeader').classList.add('hidden'); document.getElementById('userView').classList.add('hidden'); document.getElementById('adminView').classList.remove('hidden'); switchTab('list'); } else alert('Wrong!'); }
        window.onload = init;
    </script>
</body>
</html>
