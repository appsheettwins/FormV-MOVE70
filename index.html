<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียน V-MOVE 🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { border-bottom: 4px solid #6366f1; color: #4338ca; background: rgba(99, 102, 241, 0.05); }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:10000; align-items:center; justify-content:center; flex-direction: column; }
        #loginModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); z-index:10000; align-items:center; justify-content:center; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600">กำลังซิงค์ข้อมูล Cloud... ☁️</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3">
                <button id="adminLoginBtn" onclick="toggleAdminLogin(true)" class="glass-effect p-3 rounded-2xl hidden">🛠️</button>
                <div>
                    <h1 id="txt-main-title" class="text-2xl font-bold">...</h1>
                    <p class="opacity-90 font-light text-xs text-yellow-200">สวัสดีคุณ <span id="userNameDisplay">ผู้ใช้งาน</span> ✨</p>
                </div>
            </div>
            <button onclick="toggleSearchModal(true)" class="glass-effect p-3 rounded-2xl">🔍</button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div id="mainContentCard" class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 min-h-[400px]">
            <form id="meritForm" class="space-y-6">
                <div class="space-y-2"><label id="lbl-fullname" class="block"></label><input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500"></div>
                <div class="space-y-2"><label id="lbl-phone" class="block"></label><input type="tel" id="phone" required maxlength="10" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none"></div>
                <div class="space-y-2"><label id="lbl-activity" class="block"></label><select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white outline-none" onchange="handleActivityChange(this.value)"></select></div>
                <div id="subContainer" class="hidden space-y-2"><label id="lbl-detail" class="block"></label><select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50 outline-none"></select></div>
                <button type="submit" id="st-submitBtn" class="w-full gradient-bg text-white font-semibold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">ยืนยัน</button>
            </form>

            <div id="successView" class="hidden text-center py-4">
                <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500 text-3xl">✓</div>
                <h3 id="st-successHeader" class="font-bold mb-6"></h3>
                <div id="st-summaryCard" class="rounded-2xl p-6 text-left relative overflow-hidden mb-4 border">
                    <div id="sumBar" class="absolute left-0 top-0 bottom-0 w-2 bg-indigo-500"></div>
                    <p id="txt-summary-title" class="text-xs uppercase font-bold tracking-tighter mb-2"></p>
                    <p id="sumName" class="font-bold text-lg text-gray-800"></p>
                    <p id="sumDetail" class="text-gray-600 mb-3"></p>
                    <p id="txt-summary-footer" class="text-xs border-t pt-2"></p>
                </div>
                <button onclick="location.reload()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-600">➕ ทำรายการใหม่</button>
            </div>
        </div>
    </div>

    <div id="adminView" class="max-w-6xl mx-auto px-4 py-6 hidden relative z-30">
        <div class="gradient-bg p-6 rounded-t-[3rem] text-white flex justify-between items-center shadow-lg">
            <h2 class="text-2xl font-bold">Admin Manager 🛠️</h2>
            <button onclick="location.reload()" class="bg-white/20 hover:bg-white/40 px-4 py-2 rounded-xl font-bold">ออกจากระบบ 🚪</button>
        </div>

        <div class="bg-white rounded-b-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border min-h-[600px]">
            <div class="w-full md:w-3/5 border-r border-gray-100 bg-white">
                <div class="flex border-b bg-gray-50 overflow-x-auto scrollbar-hide">
                    <button onclick="switchTab('list')" id="t-list" class="px-6 py-4 font-bold active-tab whitespace-nowrap">📋 รายชื่อ</button>
                    <button onclick="switchTab('manage')" id="t-manage" class="px-6 py-4 font-bold text-gray-400 whitespace-nowrap">🏷️ กิจกรรม</button>
                    <button onclick="switchTab('form-design')" id="t-form-design" class="px-6 py-4 font-bold text-gray-400 whitespace-nowrap">📝 จัดการหน้าฟอร์ม</button>
                    <button onclick="switchTab('success-design')" id="t-success-design" class="px-6 py-4 font-bold text-gray-400 whitespace-nowrap">✅ จัดการหน้าสรุป</button>
                </div>

                <div class="p-6 overflow-y-auto max-h-[70vh]">
                    <div id="tab-list">
                        <input type="text" id="admSearch" oninput="renderHistory()" placeholder="🔍 ค้นหา..." class="w-full border p-3 rounded-xl mb-4 outline-none">
                        <table class="w-full text-sm text-left"><tbody id="admTableBody" class="divide-y"></tbody></table>
                    </div>

                    <div id="tab-manage" class="hidden space-y-4">
                        <div class="bg-indigo-50 p-6 rounded-2xl flex flex-col gap-3">
                            <div class="flex gap-2">
                                <input type="text" id="newActName" placeholder="ชื่อกิจกรรมใหม่" class="flex-1 p-3 rounded-xl border">
                                <input type="color" id="newActColor" value="#6366f1" class="w-14 h-12 rounded-xl cursor-pointer">
                            </div>
                            <button onclick="addActivity()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold">เพิ่มกิจกรรมหลัก</button>
                        </div>
                        <div id="actGrid" class="space-y-4"></div>
                        <button onclick="saveActToCloud()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-bold shadow-lg mt-4">💾 บันทึกกิจกรรมลง Sheet Activities</button>
                    </div>

                    <div id="tab-form-design" class="hidden space-y-4">
                        <div id="editor-form" class="space-y-3"></div>
                        <button onclick="saveAllToCloud()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">💾 บันทึกและสร้างคอลัมน์ใน Sheet Config</button>
                    </div>
                    <div id="tab-success-design" class="hidden space-y-4">
                        <div id="editor-success" class="space-y-3"></div>
                        <button onclick="saveAllToCloud()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">💾 บันทึกและสร้างคอลัมน์ใน Sheet Config</button>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-2/5 bg-gray-50 p-6 flex flex-col items-center">
                <div class="sticky top-6 w-full max-w-[280px]">
                    <div id="preview-container" class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-800 min-h-[480px] relative">
                        <div class="h-6 w-full bg-gray-800"></div>
                        <div id="pv-header" class="gradient-bg p-4 pt-6 text-white text-xs"><div id="pv-txt-main-title" class="font-bold">...</div></div>
                        <div class="p-4 -mt-4 bg-white rounded-t-3xl min-h-[400px]">
                             <div id="pv-form-area" class="space-y-3">
                                <label id="pv-lbl-fullname" class="block font-bold">...</label>
                                <input type="text" disabled class="w-full border p-2 rounded-lg bg-gray-50 text-[10px]">
                                <button id="pv-st-submitBtn" class="w-full py-2 rounded-lg gradient-bg text-white text-[10px] font-bold mt-4">...</button>
                             </div>
                             <div id="pv-success-area" class="hidden text-center pt-8">
                                <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2 text-green-500">✓</div>
                                <h3 id="pv-st-successHeader" class="font-bold">...</h3>
                                <div id="pv-st-summaryCard" class="rounded-xl p-4 border mt-4 text-left">
                                    <p id="pv-txt-summary-title" class="text-[8px] font-bold uppercase text-gray-400"></p>
                                    <div class="h-2 w-20 bg-gray-100 my-1 rounded"></div>
                                    <p id="pv-txt-summary-footer" class="text-[8px] mt-2 border-t pt-1"></p>
                                </div>
                             </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="loginModal">
        <div class="bg-white rounded-[2.5rem] p-10 w-full max-w-sm shadow-2xl text-center mx-4">
            <h3 class="text-2xl font-bold mb-8">Admin Access</h3>
            <input type="password" id="admPass" class="w-full px-6 py-4 bg-gray-50 border rounded-2xl mb-6 text-center text-xl outline-none" placeholder="••••">
            <div class="flex gap-3">
                <button onclick="toggleAdminLogin(false)" class="flex-1 font-bold text-gray-400">ยกเลิก</button>
                <button onclick="checkAdmin()" class="flex-1 py-4 gradient-bg text-white font-bold rounded-2xl shadow-xl">เข้าสู่ระบบ</button>
            </div>
        </div>
    </div>

    <div id="searchModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[1000] p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold">🔍 ค้นหาข้อมูล</h3><button onclick="toggleSearchModal(false)" class="text-gray-400">✕</button></div>
            <input type="tel" oninput="handleSearch(this.value)" placeholder="กรอกเบอร์โทร..." class="w-full p-4 bg-gray-50 border rounded-2xl mb-6 outline-none">
            <div id="searchResults" class="space-y-3 max-h-[40vh] overflow-y-auto scrollbar-hide"></div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbyE3u_uE7E3u_uE3u_uE3u_uE3u_uE3u_uE3u_uE3u/exec"; // ** เปลี่ยนเป็น URL ของคุณ **

        // ค่าเริ่มต้น (Default) ป้องกันหน้าจอขาวเมื่อข้อมูลใน Sheet ยังไม่แยกคอลัมน์
        let masterSettings = {
            'txt-main-title': { text: '🚗 สำรองที่นั่ง V-MOVE🙏', color: '#ffffff', size: '24px', weight: '700' },
            'lbl-fullname': { text: '👤 ชื่อ-นามสกุล', color: '#374151', size: '14px', weight: '500' },
            'lbl-phone': { text: '📞 เบอร์โทรศัพท์', color: '#374151', size: '14px', weight: '500' },
            'lbl-activity': { text: '🗓️ เลือกกิจกรรม', color: '#374151', size: '14px', weight: '500' },
            'lbl-detail': { text: '📝 ระบุรายละเอียด', color: '#374151', size: '14px', weight: '500' },
            'st-submitBtn': { text: '✨ ยืนยันข้อมูล', color: '#ffffff', size: '18px', weight: '600' },
            'st-successHeader': { text: 'บันทึกข้อมูลสำเร็จ ! รอการยืนยัน', color: '#46c700', size: '20px', weight: '700' },
            'txt-summary-title': { text: '📜 รายละเอียดการลงทะเบียน', color: '#9ca3af', size: '12px', weight: '700' },
            'txt-summary-footer': { text: '* แคปหน้าจอนี้ไว้เป็นหลักฐาน', color: '#9ca3af', size: '11px', weight: '400' },
            'st-summaryCard': { text: 'สีพื้นหลังกล่องสรุป', color: '#f9fafb', size: '0', weight: '0' }
        };

        let currentConfig = {};
        let registrationHistory = [];

        async function init() {
            if (/Chrome/.test(navigator.userAgent)) document.getElementById('adminLoginBtn').classList.remove('hidden');
            await loadCloudData();
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const p = await liff.getProfile();
                    document.getElementById('userNameDisplay').textContent = p.displayName;
                } else liff.login();
            } catch(e){}
        }

        async function loadCloudData() {
            toggleLoading(true);
            try {
                const response = await fetch(API_URL);
                const cloud = await response.json();
                // ถ้ามีข้อมูลจาก Cloud ให้ทับค่า Default
                if(cloud.settings && Object.keys(cloud.settings).length > 0) {
                    masterSettings = cloud.settings;
                }
                if(cloud.activities) currentConfig = cloud.activities;
                registrationHistory = JSON.parse(localStorage.getItem('merit_history') || '[]');
                
                applyAllSettings();
                renderOptions();
                renderEditor();
                renderHistory();
            } catch (e) { 
                console.warn("Sync failed, using defaults"); 
                applyAllSettings();
                renderEditor();
            }
            toggleLoading(false);
        }

        function applyAllSettings() {
            Object.keys(masterSettings).forEach(id => {
                const s = masterSettings[id];
                const el = document.getElementById(id);
                const pv = document.getElementById('pv-' + id);
                if (el && id !== 'st-summaryCard') {
                    el.innerText = s.text; el.style.color = s.color; el.style.fontSize = s.size; el.style.fontWeight = s.weight;
                }
                if (pv && id !== 'st-summaryCard') {
                    pv.innerText = s.text; pv.style.color = s.color; pv.style.fontSize = (parseInt(s.size) * 0.65) + 'px'; pv.style.fontWeight = s.weight;
                }
                if (id === 'st-summaryCard') {
                    document.getElementById('st-summaryCard').style.backgroundColor = s.color;
                    document.getElementById('pv-st-summaryCard').style.backgroundColor = s.color;
                }
            });
        }

        function renderEditor() {
            const formKeys = ['txt-main-title', 'lbl-fullname', 'lbl-phone', 'lbl-activity', 'lbl-detail', 'st-submitBtn'];
            const successKeys = ['st-successHeader', 'txt-summary-title', 'txt-summary-footer', 'st-summaryCard'];
            
            const createUI = (key) => {
                const s = masterSettings[key] || { text: '', color: '#000000', size: '16px', weight: '400' };
                return `<div class="bg-white border p-4 rounded-2xl shadow-sm space-y-3">
                    <span class="text-[9px] font-bold text-gray-300 uppercase">${key}</span>
                    ${key !== 'st-summaryCard' ? `<input type="text" value="${s.text}" oninput="updateMaster('${key}', 'text', this.value)" class="w-full font-bold border-b outline-none">` : `<div class="text-sm font-bold">สีพื้นหลังสรุป</div>`}
                    <div class="flex gap-4 items-center text-xs">
                        🎨 <input type="color" value="${s.color}" oninput="updateMaster('${key}', 'color', this.value)" class="w-6 h-6 cursor-pointer">
                        ${key !== 'st-summaryCard' ? `📏 <input type="number" value="${parseInt(s.size)}" oninput="updateMaster('${key}', 'size', this.value + 'px')" class="w-10 border text-center"> px
                        🔠 <select onchange="updateMaster('${key}', 'weight', this.value)" class="border rounded"><option value="400" ${s.weight=='400'?'selected':''}>ปกติ</option><option value="700" ${s.weight=='700'?'selected':''}>หนา</option></select>` : ''}
                    </div>
                </div>`;
            };
            document.getElementById('editor-form').innerHTML = formKeys.map(createUI).join('');
            document.getElementById('editor-success').innerHTML = successKeys.map(createUI).join('');
        }

        function updateMaster(key, field, val) { masterSettings[key][field] = val; applyAllSettings(); }

        async function saveAllToCloud() {
            toggleLoading(true);
            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'SAVE_ALL', settings: masterSettings }) });
                alert("✅ บันทึกและแยกคอลัมน์ใน Sheet Config เรียบร้อย!");
            } catch(e) { alert("Error saving"); }
            toggleLoading(false);
        }

        // --- Activity Management ---
        function addActivity() {
            const name = document.getElementById('newActName').value;
            if(!name) return;
            const id = 'act' + Date.now();
            currentConfig[id] = { label: name, color: document.getElementById('newActColor').value, list: [] };
            renderAdminActs();
            document.getElementById('newActName').value = '';
        }

        function renderAdminActs() {
            document.getElementById('actGrid').innerHTML = Object.keys(currentConfig).map(k => `
                <div class="bg-white border rounded-2xl p-4 shadow-sm border-l-8" style="border-left-color: ${currentConfig[k].color}">
                    <div class="flex justify-between items-center mb-2"><span class="font-bold text-indigo-900">${currentConfig[k].label}</span><button onclick="delete currentConfig['${k}']; renderAdminActs();" class="text-red-400 font-bold">✕</button></div>
                    <div class="flex flex-wrap gap-2">
                        ${currentConfig[k].list.map((sub, idx) => `<span class="bg-gray-100 px-3 py-1 rounded-full text-xs flex items-center gap-2">${sub} <button onclick="currentConfig['${k}'].list.splice(${idx},1); renderAdminActs();" class="text-red-300">✕</button></span>`).join('')}
                        <button onclick="addSubItem('${k}')" class="bg-indigo-50 text-indigo-600 px-3 py-1 rounded-full text-xs font-bold">+ เพิ่มรายการย่อย</button>
                    </div>
                </div>
            `).join('');
        }

        function addSubItem(k) {
            const item = prompt("ระบุรายการย่อย:");
            if(item) { currentConfig[k].list.push(item); renderAdminActs(); }
        }

        async function saveActToCloud() {
            toggleLoading(true);
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'SAVE_ACT', activities: currentConfig }) });
            alert("✅ บันทึกกิจกรรมลง Cloud เรียบร้อย!");
            toggleLoading(false);
            renderOptions();
        }

        function renderOptions() {
            const sel = document.getElementById('activity');
            sel.innerHTML = '<option value="" disabled selected>เลือกกิจกรรม...</option>' + 
                Object.keys(currentConfig).map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
        }

        function handleActivityChange(val) {
            const sub = document.getElementById('subOption');
            const data = currentConfig[val];
            if(data && data.list && data.list.length > 0) {
                sub.innerHTML = data.list.map(i => `<option value="${i}">${i}</option>`).join('');
                document.getElementById('subContainer').classList.remove('hidden');
            } else { document.getElementById('subContainer').classList.add('hidden'); }
        }

        function renderHistory() {
            const q = document.getElementById('admSearch').value.toLowerCase();
            const filtered = registrationHistory.filter(x => x.fullname.toLowerCase().includes(q) || x.phone.includes(q));
            document.getElementById('admTableBody').innerHTML = filtered.map(x => {
                const actKey = Object.keys(currentConfig).find(k => currentConfig[k].label === x.activity);
                const actColor = actKey ? currentConfig[actKey].color : '#ddd';
                return `<tr><td class="p-3"><div class="w-1 h-8 rounded-full" style="background:${actColor}"></div></td><td class="p-3 font-bold">${x.fullname}</td><td class="p-3 text-gray-500">${x.phone}</td><td class="p-3 text-indigo-600 font-bold">${x.activity}</td></tr>`;
            }).join('');
        }

        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            toggleLoading(true);
            const actKey = document.getElementById('activity').value;
            const act = currentConfig[actKey];
            const data = { fullname: document.getElementById('fullname').value, phone: document.getElementById('phone').value, activity: act.label, subOption: document.getElementById('subOption').value || '-' };
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(data) });
                registrationHistory.unshift(data); localStorage.setItem('merit_history', JSON.stringify(registrationHistory));
                document.getElementById('sumName').textContent = data.fullname;
                document.getElementById('sumDetail').textContent = `${data.activity} ${data.subOption !== '-' ? '('+data.subOption+')' : ''}`;
                document.getElementById('sumBar').style.backgroundColor = act.color;
                document.getElementById('meritForm').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
            } catch(e){ alert("Error"); }
            toggleLoading(false);
        };

        function switchTab(t) {
            ['list', 'manage', 'form-design', 'success-design'].forEach(tab => {
                document.getElementById('tab-'+tab).classList.toggle('hidden', tab !== t);
                document.getElementById('t-'+tab).className = tab === t ? 'px-6 py-4 font-bold active-tab whitespace-nowrap' : 'px-6 py-4 font-bold text-gray-400 whitespace-nowrap';
            });
            document.getElementById('pv-form-area').classList.toggle('hidden', t === 'success-design');
            document.getElementById('pv-success-area').classList.toggle('hidden', t !== 'success-design');
            if(t === 'manage') renderAdminActs();
            if(t === 'list') renderHistory();
        }

        function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function toggleAdminLogin(s) { document.getElementById('loginModal').style.display = s ? 'flex' : 'none'; }
        function checkAdmin() {
            if(document.getElementById('admPass').value === '1234') {
                toggleAdminLogin(false); document.getElementById('appHeader').classList.add('hidden');
                document.getElementById('userView').classList.add('hidden'); document.getElementById('adminView').classList.remove('hidden');
                switchTab('list');
            } else alert('รหัสผ่านไม่ถูกต้อง');
        }
        function toggleSearchModal(s) { document.getElementById('searchModal').classList.toggle('hidden', !s); }
        function handleSearch(q) {
            const res = document.getElementById('searchResults');
            if (q.length < 5) { res.innerHTML = '<p class="text-center text-gray-400 py-10">กรอกเบอร์โทร 5 หลักขึ้นไป</p>'; return; }
            const filtered = registrationHistory.filter(h => h.phone.includes(q));
            res.innerHTML = filtered.length ? filtered.map(h => `<div class="p-4 bg-gray-50 rounded-2xl border-l-4 border-indigo-500"><div class="font-bold">${h.fullname}</div><div class="text-xs text-gray-500">${h.activity}</div></div>`).join('') : '<p class="text-center text-gray-400 py-10">ไม่พบข้อมูล</p>';
        }
        window.onload = init;
    </script>
</body>
</html>
