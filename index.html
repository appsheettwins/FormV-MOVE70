<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สำรองที่นั่ง V-MOVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style id="custom-styles">
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { border-bottom: 3px solid #6366f1; color: #4338ca; }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:1000; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600">กำลังประมวลผล...</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-start">
                <button id="adminLoginBtn" onclick="toggleAdminLogin(true)" class="glass-effect p-3 rounded-2xl hover:bg-white/30 hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                    </svg>
                </button>
                <div>
                    <h1 id="headerTitle" class="text-2xl font-bold">สำรองที่นั่ง V-MOVE</h1>
                    <p id="headerSubTitle" class="opacity-90 font-light text-xs text-yellow-200">สวัสดีคุณ <span id="userNameDisplay">...</span></p>
                </div>
            </div>
            <button id="searchBtn" onclick="toggleSearchModal(true)" class="glass-effect p-3 rounded-2xl">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-10">
        <div id="formContainer" class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form id="meritForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="form-label text-sm font-medium text-gray-700 ml-1">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="ชื่อผู้ร่วมบุญ">
                </div>
                <div class="space-y-2">
                    <label class="form-label text-sm font-medium text-gray-700 ml-1">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required minlength="10" maxlength="10" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="08xxxxxxxx">
                </div>
                <div class="space-y-2">
                    <label class="form-label text-sm font-medium text-gray-700 ml-1">เลือกกิจกรรม</label>
                    <select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white outline-none"></select>
                </div>
                <div id="subOptionContainer" class="space-y-2 hidden">
                    <label class="form-label text-sm font-medium text-gray-700 ml-1">วันที่และสถานที่</label>
                    <select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50 outline-none"></select>
                </div>
                <button type="submit" id="submitBtn" class="w-full gradient-bg text-white font-semibold py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-lg">ลงทะเบียนตอนนี้</button>
            </form>

            <div id="successMessage" class="hidden">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500 text-3xl">✓</div>
                    <h3 id="successTitle" class="text-2xl font-bold text-gray-800">ลงทะเบียนสำเร็จ! รอการยืนยันการสำรองที่นั่ง จะส่งข้อความให้ทาง LINE</h3>
                </div>
                <div id="summaryCard" class="bg-gray-50 rounded-2xl p-5 space-y-3 border border-gray-100 mb-6 text-sm relative overflow-hidden">
                    <div id="summaryColorBar" class="absolute left-0 top-0 bottom-0 w-2"></div>
                    <p>ชื่อ: <span id="sumName" class="font-bold"></span></p>
                    <p>กิจกรรม: <span id="sumAct" class="font-bold"></span></p>
                    <p id="sumSub" class="text-gray-500 italic"></p>
                </div>
                <button onclick="resetRegistrationForm()" class="w-full py-4 bg-gray-100 text-gray-700 font-semibold rounded-2xl">กลับหน้าหลัก</button>
            </div>
        </div>
    </div>

    <div id="adminView" class="max-w-4xl mx-auto px-4 relative z-10 hidden">
        <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
            <div class="flex border-b overflow-x-auto bg-gray-50">
                <button id="tabBtn-list" onclick="switchAdminTab('list')" class="px-6 py-4 font-bold active-tab whitespace-nowrap">รายชื่อ</button>
                <button id="tabBtn-manage" onclick="switchAdminTab('manage')" class="px-6 py-4 font-bold text-gray-400 whitespace-nowrap">กิจกรรม</button>
                <button id="tabBtn-style" onclick="switchAdminTab('style')" class="px-6 py-4 font-bold text-gray-400 whitespace-nowrap">ปรับแต่งดีไซน์ 🎨</button>
            </div>

            <div id="adminTab-style" class="p-6 hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <h4 class="font-bold border-b pb-2">ส่วนฟอร์ม (Form Settings)</h4>
                        <div>
                            <label class="block text-xs mb-1">สีข้อความ Label</label>
                            <input type="color" onchange="updateStyle('labelColor', this.value)" id="style-labelColor" class="w-full h-10 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs mb-1">ขนาดตัวอักษรฟอร์ม</label>
                            <select onchange="updateStyle('fontSize', this.value)" id="style-fontSize" class="w-full p-2 border rounded-lg">
                                <option value="14px">เล็ก (14px)</option>
                                <option value="16px">ปกติ (16px)</option>
                                <option value="18px">ใหญ่ (18px)</option>
                            </select>
                        </div>
                    </div>
                    <div class="space-y-4">
                        <h4 class="font-bold border-b pb-2">ส่วนสรุป (Summary Settings)</h4>
                        <div>
                            <label class="block text-xs mb-1">สีพื้นหลังสรุปข้อมูล</label>
                            <input type="color" onchange="updateStyle('summaryBg', this.value)" id="style-summaryBg" class="w-full h-10 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs mb-1">ขนาดหัวข้อ "สำเร็จ"</label>
                            <input type="range" min="20" max="40" oninput="updateStyle('successTitleSize', this.value + 'px')" id="style-successSize" class="w-full">
                        </div>
                    </div>
                </div>
                <button onclick="resetStyles()" class="mt-8 text-sm text-gray-400 underline">คืนค่าโรงงาน</button>
            </div>

            <div id="adminTab-list" class="p-6">
                <div id="historyTableBody">...เรียกข้อมูลจาก LocalStorage...</div>
            </div>
            
            <div id="adminTab-manage" class="p-6 hidden">
                <div id="adminActList"></div>
            </div>

            <div class="p-6 bg-gray-50 border-t flex justify-center">
                <button onclick="logoutAdmin()" class="text-red-500 font-medium">ออกจากโหมดผู้ดูแล</button>
            </div>
        </div>
    </div>

    <div id="adminLoginModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm">
            <h3 class="text-xl font-bold mb-6 text-center">Admin Login</h3>
            <input type="password" id="adminPassword" placeholder="รหัสผ่าน" class="w-full px-4 py-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex gap-3">
                <button onclick="toggleAdminLogin(false)" class="flex-1 py-3 text-gray-500">ยกเลิก</button>
                <button onclick="checkAdminPassword()" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl">ยืนยัน</button>
            </div>
        </div>
    </div>

    <script>
        const YOUR_LIFF_ID = "2008940385-theIq9K7"; 
        const YOUR_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec";

        let currentConfig = JSON.parse(localStorage.getItem('merit_config')) || {
            'act1': { label: 'ธรรมยาตรา', color: '#6366f1', list: ['2 ม.ค. - วัดพระธรรมกาย'] }
        };

        // --- ระบบปรับแต่งดีไซน์ ---
        let uiStyle = JSON.parse(localStorage.getItem('merit_ui_style')) || {
            labelColor: '#374151',
            fontSize: '16px',
            summaryBg: '#f9fafb',
            successTitleSize: '24px'
        };

        function applyStyles() {
            const labels = document.querySelectorAll('.form-label');
            labels.forEach(l => l.style.color = uiStyle.labelColor);
            
            document.getElementById('meritForm').style.fontSize = uiStyle.fontSize;
            document.getElementById('summaryCard').style.backgroundColor = uiStyle.summaryBg;
            document.getElementById('successTitle').style.fontSize = uiStyle.successTitleSize;

            // Update Admin Inputs
            document.getElementById('style-labelColor').value = uiStyle.labelColor;
            document.getElementById('style-fontSize').value = uiStyle.fontSize;
            document.getElementById('style-summaryBg').value = uiStyle.summaryBg;
            document.getElementById('style-successSize').value = parseInt(uiStyle.successTitleSize);
        }

        function updateStyle(prop, val) {
            uiStyle[prop] = val;
            localStorage.setItem('merit_ui_style', JSON.stringify(uiStyle));
            applyStyles();
        }

        function resetStyles() {
            localStorage.removeItem('merit_ui_style');
            location.reload();
        }

        // --- เช็คเบราว์เซอร์ Chrome เท่านั้น ---
        function checkBrowser() {
            const isChrome = /Chrome/.test(navigator.userAgent) && /Google Inc/.test(navigator.vendor);
            if (isChrome) {
                document.getElementById('adminLoginBtn').classList.remove('hidden');
            }
        }

        // --- ฟังก์ชันหลัก ---
        async function init() {
            checkBrowser();
            applyStyles();
            try {
                await liff.init({ liffId: YOUR_LIFF_ID });
                if (liff.isLoggedIn()) {
                    const profile = await liff.getProfile();
                    document.getElementById('userNameDisplay').textContent = profile.displayName;
                } else { liff.login(); }
            } catch (e) { console.error(e); }
            renderActivityOptions();
        }

        function renderActivityOptions() {
            const select = document.getElementById('activity');
            select.innerHTML = '<option value="" disabled selected>เลือกกิจกรรม</option>' + 
                Object.keys(currentConfig).map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
        }

        document.getElementById('activity').onchange = function() {
            const sub = document.getElementById('subOption');
            const data = currentConfig[this.value];
            sub.innerHTML = '';
            if (data) {
                data.list.forEach(i => sub.innerHTML += `<option value="${i}">${i}</option>`);
                document.getElementById('subOptionContainer').classList.remove('hidden');
            }
        };

        // --- Admin Logic ---
        function switchAdminTab(tab) {
            ['list', 'manage', 'style'].forEach(t => {
                document.getElementById(`adminTab-${t}`).classList.toggle('hidden', t !== tab);
                document.getElementById(`tabBtn-${t}`).className = t === tab ? 'px-6 py-4 font-bold active-tab whitespace-nowrap' : 'px-6 py-4 font-bold text-gray-400 whitespace-nowrap';
            });
        }

        function toggleAdminLogin(show) { document.getElementById('adminLoginModal').classList.toggle('hidden', !show); }
        function checkAdminPassword() {
            if (document.getElementById('adminPassword').value === '1234') {
                toggleAdminLogin(false);
                document.getElementById('userView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
            } else { alert('รหัสผิด'); }
        }
        function logoutAdmin() { location.reload(); }

        window.onload = init;
    </script>
</body>
</html>
