<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบลงทะเบียนกิจกรรมบุญ 🌟</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style id="dynamic-styles">
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .active-tab { border-bottom: 4px solid #6366f1; color: #4338ca; background: rgba(99, 102, 241, 0.05); }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:10000; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600">กำลังประมวลผลผ่าน Cloud... ☁️</p>
    </div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-start">
                <button id="adminLoginBtn" onclick="toggleAdminLogin(true)" class="glass-effect p-3 rounded-2xl hover:bg-white/30 hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" stroke-width="2"/></svg>
                </button>
                <div>
                    <h1 id="txt-main-title" class="text-2xl font-bold">...</h1>
                    <p class="opacity-90 font-light text-xs text-yellow-200">สวัสดีคุณ <span id="userNameDisplay">ผู้มีบุญ</span> ✨</p>
                </div>
            </div>
            <button onclick="toggleSearchModal(true)" class="glass-effect p-3 rounded-2xl hover:bg-white/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-width="2"/></svg>
            </button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div id="mainContentCard" class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100 min-h-[400px]">
            <form id="meritForm" class="space-y-6">
                <div class="space-y-2">
                    <label id="lbl-fullname" class="block">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="space-y-2">
                    <label id="lbl-phone" class="block">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required maxlength="10" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none">
                </div>
                <div class="space-y-2">
                    <label id="lbl-activity" class="block">เลือกกิจกรรม</label>
                    <select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white outline-none"></select>
                </div>
                <div id="subContainer" class="hidden space-y-2">
                    <label id="lbl-detail" class="block">รายละเอียด</label>
                    <select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50 outline-none"></select>
                </div>
                <button type="submit" id="st-submitBtn" class="w-full gradient-bg text-white font-semibold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">ยืนยันข้อมูล</button>
            </form>

            <div id="successView" class="hidden text-center py-4">
                <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4 text-green-500 text-4xl">✅</div>
                <h3 id="st-successHeader" class="font-bold mb-6">สำเร็จ</h3>
                <div id="st-summaryCard" class="rounded-2xl p-6 text-left relative overflow-hidden mb-6 border">
                    <div id="sumBar" class="absolute left-0 top-0 bottom-0 w-2 bg-indigo-500"></div>
                    <div class="space-y-1">
                        <p id="txt-summary-title" class="text-xs uppercase font-bold tracking-tighter">รายละเอียด</p>
                        <p id="sumName" class="font-bold text-lg text-gray-800"></p>
                        <p id="sumDetail" class="text-gray-600"></p>
                    </div>
                </div>
                <button id="btn-reload" onclick="location.reload()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-600">ลงทะเบียนเพิ่ม</button>
            </div>
        </div>
    </div>

    <div id="adminView" class="max-w-6xl mx-auto px-4 py-6 hidden relative z-30">
        <div class="gradient-bg p-6 rounded-t-[3rem] text-white flex justify-between items-center shadow-lg">
            <div>
                <h2 class="text-2xl font-bold">ระบบจัดการแบบรวมศูนย์ 🛠️</h2>
                <p class="opacity-80 text-sm">จัดการกิจกรรม ข้อความ และดีไซน์ผ่าน Cloud</p>
            </div>
            <button onclick="location.reload()" class="bg-white/20 hover:bg-white/40 px-4 py-2 rounded-xl font-bold flex items-center gap-2">ออกจากระบบ 🚪</button>
        </div>

        <div class="bg-white rounded-b-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row border">
            <div class="w-full md:w-3/5 border-r border-gray-100">
                <div class="flex border-b bg-gray-50 overflow-x-auto scrollbar-hide">
                    <button onclick="switchTab('list')" id="t-list" class="px-6 py-4 font-bold active-tab">📋 รายชื่อ</button>
                    <button onclick="switchTab('manage')" id="t-manage" class="px-6 py-4 font-bold text-gray-400">🏷️ กิจกรรม</button>
                    <button onclick="switchTab('form-design')" id="t-form-design" class="px-6 py-4 font-bold text-gray-400">📝 จัดการหน้าฟอร์ม</button>
                    <button onclick="switchTab('success-design')" id="t-success-design" class="px-6 py-4 font-bold text-gray-400">✅ จัดการหน้าสรุป</button>
                </div>

                <div class="p-6 overflow-y-auto max-h-[70vh]">
                    <div id="tab-list">
                        <input type="text" id="admSearch" oninput="renderHistory()" placeholder="🔍 ค้นหา..." class="w-full border p-3 rounded-xl mb-4">
                        <div class="overflow-x-auto"><table class="w-full text-sm text-left"><tbody id="admTableBody" class="divide-y"></tbody></table></div>
                    </div>

                    <div id="tab-manage" class="hidden space-y-4">
                        <div class="bg-indigo-50 p-4 rounded-2xl flex gap-3">
                            <input type="text" id="newActName" placeholder="ชื่อกิจกรรมใหม่" class="flex-1 p-2 rounded-xl border">
                            <input type="color" id="newActColor" value="#6366f1" class="w-12 h-10 rounded-lg">
                            <button onclick="addActivity()" class="bg-indigo-600 text-white px-4 rounded-xl font-bold">เพิ่ม</button>
                        </div>
                        <div id="actGrid" class="grid grid-cols-1 gap-3"></div>
                        <button onclick="saveActToCloud()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold shadow-md">💾 บันทึกกิจกรรมลง Cloud</button>
                    </div>

                    <div id="tab-form-design" class="hidden space-y-6">
                        <div class="text-sm font-bold text-indigo-500 uppercase">ส่วนหัวและข้อความหน้าฟอร์ม</div>
                        <div id="editor-form" class="space-y-4"></div>
                        <button onclick="saveAllToCloud()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg">💾 บันทึกการเปลี่ยนแปลงทั้งหมด</button>
                    </div>

                    <div id="tab-success-design" class="hidden space-y-6">
                        <div class="text-sm font-bold text-green-500 uppercase">ข้อความและดีไซน์หน้าสรุปผล</div>
                        <div id="editor-success" class="space-y-4"></div>
                        <button onclick="saveAllToCloud()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg">💾 บันทึกการเปลี่ยนแปลงทั้งหมด</button>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-2/5 bg-gray-50 p-6 flex flex-col items-center justify-start min-h-[500px]">
                <div class="sticky top-6 w-full max-w-[320px]">
                    <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase tracking-widest text-center">📱 Live Preview (มุมมองผู้ใช้)</p>
                    <div id="preview-container" class="bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-[6px] border-gray-800 min-h-[500px] relative">
                        <div class="h-6 w-full bg-gray-800"></div>
                        <div id="pv-header" class="gradient-bg p-4 pt-8 text-white text-sm">
                            <div id="pv-txt-main-title" class="font-bold">...</div>
                        </div>
                        <div class="p-4 -mt-4 bg-white rounded-t-3xl min-h-[400px]">
                             <div id="pv-form-area" class="space-y-3">
                                <label id="pv-lbl-fullname" class="block text-xs font-bold">...</label>
                                <input type="text" disabled class="w-full border p-2 rounded-lg bg-gray-50 text-xs">
                                <button id="pv-st-submitBtn" class="w-full py-2 rounded-lg gradient-bg text-white text-xs font-bold">...</button>
                             </div>
                             <div id="pv-success-area" class="hidden text-center pt-10">
                                <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-2 text-green-500">✓</div>
                                <h3 id="pv-st-successHeader" class="font-bold text-sm">...</h3>
                                <div id="pv-st-summaryCard" class="rounded-xl p-4 border mt-4 text-left">
                                    <p id="pv-txt-summary-title" class="text-[8px] font-bold uppercase text-gray-400">...</p>
                                    <div class="h-2 w-20 bg-gray-100 mt-1 rounded"></div>
                                </div>
                             </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="searchModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[1000] p-4">
        <div class="bg-white w-full max-w-md rounded-[2rem] p-6 shadow-2xl">
            <div class="flex justify-between items-center mb-4"><h3 class="font-bold">🔍 ค้นหาข้อมูล</h3><button onclick="toggleSearchModal(false)">✕</button></div>
            <input type="tel" oninput="handleSearch(this.value)" placeholder="กรอกเบอร์โทร..." class="w-full p-3 bg-gray-50 border rounded-xl mb-4 outline-none">
            <div id="searchResults" class="space-y-3 max-h-[40vh] overflow-y-auto"></div>
        </div>
    </div>

    <div id="loginModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center p-6 z-[1000]">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl text-center">
            <h3 class="text-xl font-bold mb-6">🔐 แอดมินเข้าสู่ระบบ</h3>
            <input type="password" id="admPass" class="w-full px-4 py-3 border rounded-xl mb-4 text-center outline-none" placeholder="รหัสผ่าน">
            <div class="flex gap-3"><button onclick="toggleAdminLogin(false)" class="flex-1 text-gray-400">ยกเลิก</button><button onclick="checkAdmin()" class="flex-1 py-3 bg-indigo-600 text-white font-bold rounded-xl shadow-lg">ยืนยัน</button></div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbyN_vG03u248P04FvX_O0u4_K00S0T5I4_r-99_qP5_I_P_O_I_T/exec"; // ** แก้ไขเป็น URL ของคุณ **

        let masterSettings = {
            'txt-main-title': { text: 'ลงทะเบียนร่วมบุญ 🙏', color: '#ffffff', size: '24px', weight: '700' },
            'lbl-fullname': { text: '👤 ชื่อ-นามสกุล', color: '#374151', size: '14px', weight: '500' },
            'lbl-phone': { text: '📞 เบอร์โทรศัพท์', color: '#374151', size: '14px', weight: '500' },
            'lbl-activity': { text: '🗓️ เลือกกิจกรรม', color: '#374151', size: '14px', weight: '500' },
            'lbl-detail': { text: '📝 ระบุรายละเอียด', color: '#374151', size: '14px', weight: '500' },
            'st-submitBtn': { text: '✨ ยืนยันข้อมูล', color: '#ffffff', size: '18px', weight: '600' },
            'st-successHeader': { text: 'บันทึกข้อมูลสำเร็จ ✅', color: '#1f2937', size: '24px', weight: '700' },
            'txt-summary-title': { text: '📜 รายละเอียดการลงทะเบียน', color: '#9ca3af', size: '12px', weight: '700' },
            'st-summaryCard': { text: 'สีพื้นหลังกล่องสรุป', color: '#f9fafb', size: '0', weight: '0' }
        };

        let currentConfig = {};

        async function init() {
            if (/Chrome/.test(navigator.userAgent)) document.getElementById('adminLoginBtn').classList.remove('hidden');
            await loadCloudData();
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    const p = await liff.getProfile();
                    document.getElementById('userNameDisplay').textContent = p.displayName;
                } else liff.login();
            } catch(e){}
        }

        async function loadCloudData() {
            toggleLoading(true);
            try {
                const response = await fetch(API_URL);
                const cloud = await response.json();
                if(cloud.settings) masterSettings = cloud.settings;
                if(cloud.activities) currentConfig = cloud.activities;
                applyAllSettings();
                renderOptions();
                renderEditor();
            } catch (e) { console.warn("Load failed, using default."); }
            toggleLoading(false);
        }

        function applyAllSettings() {
            let css = "";
            Object.keys(masterSettings).forEach(id => {
                const s = masterSettings[id];
                const el = document.getElementById(id);
                const pv = document.getElementById('pv-' + id);
                
                if (el && id !== 'st-summaryCard') {
                    el.innerText = s.text;
                    el.style.color = s.color;
                    el.style.fontSize = s.size;
                    el.style.fontWeight = s.weight;
                }
                if (pv && id !== 'st-summaryCard') {
                    pv.innerText = s.text;
                    pv.style.color = s.color;
                    pv.style.fontSize = (parseInt(s.size) * 0.7) + 'px'; // Scale down for mobile preview
                    pv.style.fontWeight = s.weight;
                }
                if (id === 'st-summaryCard') {
                    document.getElementById('st-summaryCard').style.backgroundColor = s.color;
                    document.getElementById('pv-st-summaryCard').style.backgroundColor = s.color;
                }
            });
        }

        function renderEditor() {
            const formKeys = ['txt-main-title', 'lbl-fullname', 'lbl-phone', 'lbl-activity', 'lbl-detail', 'st-submitBtn'];
            const successKeys = ['st-successHeader', 'txt-summary-title', 'st-summaryCard'];
            
            const createUI = (key) => {
                const s = masterSettings[key];
                return `
                <div class="bg-white border p-4 rounded-2xl shadow-sm space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-gray-400 uppercase">ID: ${key}</span>
                    </div>
                    ${key !== 'st-summaryCard' ? `<input type="text" value="${s.text}" oninput="updateMaster('${key}', 'text', this.value)" class="w-full font-bold border-b p-1 outline-none focus:border-indigo-500">` : `<span class="font-bold text-sm">${s.text}</span>`}
                    <div class="flex flex-wrap gap-4 items-center text-xs">
                        <div class="flex items-center gap-1">🎨 <input type="color" value="${s.color}" oninput="updateMaster('${key}', 'color', this.value)"></div>
                        ${key !== 'st-summaryCard' ? `
                        <div class="flex items-center gap-1">📏 <input type="number" value="${parseInt(s.size)}" oninput="updateMaster('${key}', 'size', this.value + 'px')" class="w-10 border rounded text-center"> px</div>
                        <div class="flex items-center gap-1">🔠 <select onchange="updateMaster('${key}', 'weight', this.value)" class="border rounded px-1">
                            <option value="300" ${s.weight=='300'?'selected':''}>บาง</option>
                            <option value="400" ${s.weight=='400'?'selected':''}>ปกติ</option>
                            <option value="700" ${s.weight=='700'?'selected':''}>หนา</option>
                        </select></div>
                        ` : ''}
                    </div>
                </div>`;
            };

            document.getElementById('editor-form').innerHTML = formKeys.map(createUI).join('');
            document.getElementById('editor-success').innerHTML = successKeys.map(createUI).join('');
        }

        function updateMaster(key, field, val) {
            masterSettings[key][field] = val;
            applyAllSettings();
        }

        async function saveAllToCloud() {
            toggleLoading(true);
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'SAVE_ALL', settings: masterSettings }) });
                alert("✨ บันทึกดีไซน์และข้อความลง Cloud เรียบร้อย!");
            } catch (e) { alert("เกิดข้อผิดพลาดในการบันทึก"); }
            toggleLoading(false);
        }

        // --- Tab Management ---
        function switchTab(t) {
            ['list', 'manage', 'form-design', 'success-design'].forEach(tab => {
                document.getElementById('tab-'+tab).classList.toggle('hidden', tab !== t);
                document.getElementById('t-'+tab).className = tab === t ? 'px-6 py-4 font-bold active-tab' : 'px-6 py-4 font-bold text-gray-400';
            });
            // Preview logic
            document.getElementById('pv-form-area').classList.toggle('hidden', t === 'success-design');
            document.getElementById('pv-success-area').classList.toggle('hidden', t !== 'success-design');
            if(t === 'list') renderHistory();
            if(t === 'manage') renderAdminActs();
        }

        // --- Activity Logic ---
        function addActivity() {
            const name = document.getElementById('newActName').value;
            if(!name) return;
            const id = 'act' + Date.now();
            currentConfig[id] = { label: name, color: document.getElementById('newActColor').value, list: [] };
            renderAdminActs();
            document.getElementById('newActName').value = '';
        }

        function renderAdminActs() {
            document.getElementById('actGrid').innerHTML = Object.keys(currentConfig).map(k => `
                <div class="flex items-center justify-between bg-gray-50 p-3 rounded-xl border">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full" style="background:${currentConfig[k].color}"></div>
                        <span class="font-bold">${currentConfig[k].label}</span>
                    </div>
                    <button onclick="delete currentConfig['${k}']; renderAdminActs();" class="text-red-400">✕</button>
                </div>
            `).join('');
        }

        async function saveActToCloud() {
            toggleLoading(true);
            await fetch(API_URL, { method: 'POST', body: JSON.stringify({ type: 'SAVE_ACT', activities: currentConfig }) });
            alert("✅ บันทึกกิจกรรมเรียบร้อย");
            toggleLoading(false);
            renderOptions();
        }

        function renderOptions() {
            const sel = document.getElementById('activity');
            sel.innerHTML = '<option value="" disabled selected>เลือกกิจกรรม...</option>' + 
                Object.keys(currentConfig).map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
        }

        // --- Form Submission ---
        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            toggleLoading(true);
            const act = currentConfig[document.getElementById('activity').value];
            const data = {
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                activity: act.label,
                subOption: document.getElementById('subOption').value || '-'
            };
            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
                document.getElementById('sumName').textContent = data.fullname;
                document.getElementById('sumDetail').textContent = data.activity;
                document.getElementById('sumBar').style.backgroundColor = act.color;
                document.getElementById('meritForm').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
            } catch(e){ alert("บันทึกไม่สำเร็จ"); }
            toggleLoading(false);
        };

        // --- Helper Functions ---
        function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }
        function toggleAdminLogin(s) { document.getElementById('loginModal').classList.toggle('hidden', !s); }
        function checkAdmin() {
            if(document.getElementById('admPass').value === '1234') {
                toggleAdminLogin(false);
                document.getElementById('appHeader').classList.add('hidden');
                document.getElementById('userView').classList.add('hidden');
                document.getElementById('adminView').classList.remove('hidden');
                switchTab('list');
            } else alert('รหัสผ่านไม่ถูกต้อง');
        }
        function toggleSearchModal(s) { document.getElementById('searchModal').classList.toggle('hidden', !s); }
        
        window.onload = init;
    </script>
</body>
</html>
