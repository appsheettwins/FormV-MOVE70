<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ลงทะเบียนกิจกรรมบุญ</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{font-family:'Kanit',sans-serif;background-color:#f8fafc;}
.gradient-bg{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);}
.glass-effect{background:rgba(255,255,255,0.2);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);}
.animate-in{animation:fadeIn .3s ease-out forwards;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.active-tab{border-bottom:3px solid #6366f1;color:#4338ca;}
</style>
</head>

<body class="min-h-screen pb-12">

<!-- ====== โค้ด HTML ทั้งหมดของคุณคงเดิม ====== -->
<!-- (ตัดออกในคำตอบนี้เพื่อความสั้น แต่ให้ใช้ของคุณเหมือนเดิมทุกบรรทัด) -->

<script>
/**************************************************
CONFIG เชื่อมต่อระบบ
**************************************************/
const LIFF_ID = "2008940385-theIq9K7";
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec";

let lineProfile = null;

/**************************************************
เชื่อม LINE
**************************************************/
async function initLine(){
    await liff.init({ liffId: LIFF_ID });

    if(!liff.isLoggedIn()){
        liff.login();
        return;
    }

    lineProfile = await liff.getProfile();

    document.getElementById("headerSubTitle").textContent =
        "เข้าสู่ระบบโดย: " + lineProfile.displayName;

    // บันทึก user
    await postToGas({
        action:"saveUser",
        userId:lineProfile.userId,
        displayName:lineProfile.displayName,
        pictureUrl:lineProfile.pictureUrl,
        statusMessage:lineProfile.statusMessage
    });

    // บันทึก login log
    await postToGas({
        action:"logLogin",
        userId:lineProfile.userId,
        displayName:lineProfile.displayName
    });
}

/**************************************************
ส่งข้อมูลไป Google Script
**************************************************/
async function postToGas(payload){
    return fetch(WEBAPP_URL,{
        method:"POST",
        body:JSON.stringify(payload)
    });
}

/**************************************************
Override ฟอร์มเดิม (เพิ่มการส่งเข้า Sheet)
**************************************************/
document.getElementById('meritForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const phone = document.getElementById('phone').value;
    const actKey = document.getElementById('activity').value;
    const config = currentConfig[actKey];

    const data = {
        fullname: document.getElementById('fullname').value,
        phone: phone,
        activity: config.label,
        subOption: document.getElementById('subOption').value,
        timestamp: new Date().toISOString()
    };

    // ส่งเข้า Google Sheet
    await postToGas({
        action:"submitForm",
        userId:lineProfile?.userId || "",
        displayName:lineProfile?.displayName || "",
        profileName:lineProfile?.displayName || "",
        inputName:data.fullname,
        phone:data.phone,
        activity:data.activity,
        item:data.subOption
    });

    // ===== โค้ดเดิมของคุณ (แสดงผล + localStorage) =====
    document.getElementById('sumName').textContent = data.fullname;
    document.getElementById('sumPhone').textContent = data.phone;
    document.getElementById('sumAct').textContent = data.activity;
    document.getElementById('sumAct').style.color = config.color;
    document.getElementById('sumSub').textContent = data.subOption;
    document.getElementById('summaryColorBar').style.backgroundColor = config.color;

    const history = JSON.parse(localStorage.getItem('merit_history') || '[]');
    history.unshift(data);
    localStorage.setItem('merit_history', JSON.stringify(history));

    this.classList.add('hidden');
    document.getElementById('successMessage').classList.remove('hidden');
});

/**************************************************
START APP
**************************************************/
window.addEventListener("load", async function(){
    initApp();   // ของเดิม
    await initLine();  // เพิ่ม LINE
});
</script>

</body>
</html>
