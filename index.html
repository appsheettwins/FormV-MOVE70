<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียนกิจกรรมบุญ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        #loading { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; color: white; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <div id="loading"><div class="animate-spin rounded-full h-12 w-12 border-t-2 border-white"></div></div>

    <div id="appHeader" class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-start">
                <div id="profileImg" class="w-12 h-12 rounded-2xl bg-white/20 overflow-hidden border-2 border-white/30">
                    <img id="userImg" src="" alt="" class="hidden w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-2xl font-bold">ลงทะเบียนร่วมบุญ</h1>
                    <p class="opacity-90 font-light text-xs">สวัสดีคุณ <span id="displayName">...</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-10">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form id="meritForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700 ml-1">ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700 ml-1">เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required minlength="10" maxlength="10" pattern="[0-9]{10}" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-medium text-gray-700 ml-1">เลือกกิจกรรม</label>
                    <select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white outline-none"></select>
                </div>
                <div id="subOptionContainer" class="space-y-2 hidden">
                    <label class="text-sm font-medium text-gray-700 ml-1">ระบุวันที่และสถานที่</label>
                    <select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50 outline-none"></select>
                </div>
                <button type="submit" class="w-full gradient-bg text-white font-semibold py-4 rounded-2xl shadow-lg hover:opacity-90 active:scale-95 transition-all">บันทึกข้อมูล</button>
            </form>

            <div id="successMessage" class="hidden text-center py-6">
                <div class="text-green-500 text-5xl mb-4">✓</div>
                <h3 class="text-xl font-bold">ลงทะเบียนสำเร็จ</h3>
                <button onclick="location.reload()" class="mt-6 text-indigo-600 font-medium">ลงทะเบียนเพิ่ม</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = '2008940385-theIq9K7';
        const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec';

        let userProfile = {};
        const activities = {
            'act1': { label: 'ธรรมยาตรา', list: ['2 ม.ค. - วัดพระธรรมกาย', '5 ม.ค. - อนุสรณ์สถาน'] },
            'act2': { label: 'จุดประทีป', list: ['15 ม.ค. - ลานธรรม', '25 ม.ค. - มาฆบูชา'] }
        };

        async function init() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    userProfile = await liff.getProfile();
                    document.getElementById('displayName').textContent = userProfile.displayName;
                    if (userProfile.pictureUrl) {
                        const img = document.getElementById('userImg');
                        img.src = userProfile.pictureUrl;
                        img.classList.remove('hidden');
                    }
                }
            } catch (err) { console.error(err); }

            // Setup Activity Dropdown
            const actSelect = document.getElementById('activity');
            actSelect.innerHTML = '<option value="" disabled selected>เลือกกิจกรรม</option>';
            for (let key in activities) {
                actSelect.innerHTML += `<option value="${key}">${activities[key].label}</option>`;
            }
        }

        document.getElementById('activity').onchange = function() {
            const sub = document.getElementById('subOption');
            const container = document.getElementById('subOptionContainer');
            const selected = activities[this.value];
            sub.innerHTML = '';
            if (selected) {
                selected.list.forEach(item => sub.innerHTML += `<option value="${item}">${item}</option>`);
                container.classList.remove('hidden');
            }
        };

        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            document.getElementById('loading').style.display = 'flex';

            const payload = {
                action: 'register',
                userId: userProfile.userId,
                displayName: userProfile.displayName,
                pictureUrl: userProfile.pictureUrl,
                statusMessage: userProfile.statusMessage,
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                activity: activities[document.getElementById('activity').value].label,
                subOption: document.getElementById('subOption').value
            };

            try {
                // ส่งข้อมูลเข้า Google Sheets แบบ POST
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญมากสำหรับ GitHub -> Google Script
                    body: JSON.stringify(payload)
                });
                
                document.getElementById('meritForm').classList.add('hidden');
                document.getElementById('successMessage').classList.remove('hidden');
            } catch (err) {
                alert('บันทึกไม่สำเร็จ กรุณาลองใหม่');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };

        init();
    </script>
</body>
</html>
