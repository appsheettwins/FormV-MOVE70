<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สำรองที่นั่ง V-MOVE 🚗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8fafc; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .glass-effect { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #loadingOverlay { display:none; position:fixed; inset:0; background:rgba(255,255,255,0.8); z-index:9999; align-items:center; justify-content:center; flex-direction: column; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <div id="loadingOverlay">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600 animate-pulse">กำลังดำเนินการ... 🚗✨</p>
    </div>

    <div class="gradient-bg text-white pt-10 pb-24 px-6 rounded-b-[3rem] shadow-lg mb-[-40px] relative z-10">
        <div class="max-w-md mx-auto flex justify-between items-start">
            <div class="flex gap-3 items-center">
                <button onclick="toggleAdminLogin(true)" class="glass-effect p-3 rounded-2xl">🛠️</button>
                <div>
                    <h1 class="text-2xl font-bold">V-MOVE Booking 🚗</h1>
                    <p class="text-sm text-yellow-300">สวัสดีคุณ <span id="userNameDisplay" class="font-bold underline">...</span> 🙏</p>
                </div>
            </div>
            <button onclick="toggleSearchModal(true)" class="glass-effect p-3 rounded-2xl">🔍 ค้นหา</button>
        </div>
    </div>

    <div id="userView" class="max-w-md mx-auto px-4 relative z-20">
        <div class="bg-white rounded-3xl shadow-xl p-8 border border-gray-100">
            <form id="meritForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-700 ml-1 mb-1">👤 ชื่อ-นามสกุล</label>
                    <input type="text" id="fullname" required class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none focus:ring-2 focus:ring-indigo-500" placeholder="ระบุชื่อผู้จอง">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 ml-1 mb-1">📞 เบอร์โทรศัพท์</label>
                    <input type="tel" id="phone" required maxlength="10" class="w-full px-4 py-3 rounded-xl border border-gray-200 outline-none" placeholder="08XXXXXXXX">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 ml-1 mb-1">🗓️ เลือกกิจกรรม</label>
                    <select id="activity" required class="w-full px-4 py-3 rounded-xl border border-gray-200 bg-white" onchange="updateSubOptions()"></select>
                </div>
                <div id="subContainer" class="hidden">
                    <label class="block text-sm font-medium text-gray-700 ml-1 mb-1">📍 ระบุจุดรับ/รายละเอียด</label>
                    <select id="subOption" class="w-full px-4 py-3 rounded-xl border border-indigo-200 bg-indigo-50 outline-none"></select>
                </div>
                <button type="submit" class="w-full gradient-bg text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-all">✨ ยืนยันการจองที่นั่ง</button>
            </form>

            <div id="successView" class="hidden text-center py-6 animate-in">
                <div class="text-6xl mb-4">✅</div>
                <h3 class="text-xl font-bold text-green-600 mb-6">บันทึกสำเร็จ! 🙏</h3>
                <div class="bg-gray-50 rounded-2xl p-6 text-left border border-gray-100 mb-6">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">สรุปรายการ</p>
                    <p id="sumName" class="font-bold text-lg text-gray-800"></p>
                    <p id="sumDetail" class="text-indigo-600 font-medium"></p>
                </div>
                <button onclick="location.reload()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-600">➕ ทำรายการเพิ่ม</button>
            </div>
        </div>
    </div>

    <div id="searchModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-end">
        <div class="bg-white rounded-t-[2.5rem] w-full p-8 max-h-[85vh] overflow-y-auto animate-in">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-bold text-gray-800">🔍 ค้นหาประวัติการจอง</h3>
                <button onclick="toggleSearchModal(false)" class="p-2 bg-gray-100 rounded-full">✕</button>
            </div>
            <input type="tel" id="searchPhone" oninput="runSearch()" placeholder="กรอกเบอร์โทรศัพท์เพื่อค้นหา..." class="w-full px-6 py-4 bg-gray-50 rounded-2xl border-none outline-none ring-2 ring-gray-100 focus:ring-indigo-500 mb-6 text-lg">
            <div id="searchResults" class="space-y-4 pb-10"></div>
        </div>
    </div>

    <div id="adminLoginModal" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl animate-in">
            <h3 class="text-xl font-bold mb-6">สำหรับผู้ดูแล 🔐</h3>
            <input type="password" id="adminPass" placeholder="รหัสผ่าน" class="w-full px-4 py-4 border rounded-xl mb-6 text-center text-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex gap-3">
                <button onclick="toggleAdminLogin(false)" class="flex-1 py-3 text-gray-400">ยกเลิก</button>
                <button onclick="checkAdmin()" class="flex-1 py-3 gradient-bg text-white rounded-xl font-bold">เข้าระบบ</button>
            </div>
        </div>
    </div>

    <script>
        const LIFF_ID = "2008940385-theIq9K7"; 
        const API_URL = "https://script.google.com/macros/s/AKfycbynMJZfK0llXJeSd8_thnWndhwMIVGB16MqFHW3qvsP2pyYdNTK-Tu04KLsM8S2DYat/exec"; 

        // กิจกรรมแม่แบบ
        let currentConfig = JSON.parse(localStorage.getItem('merit_config')) || {
            'act1': { label: 'ธรรมยาตรา 🚶', color: '#6366f1', list: ['วัดพระธรรมกาย', 'อนุสรณ์สถาน'] },
            'act2': { label: 'จุดประทีป ✨', color: '#f59e0b', list: ['ลานธรรม', 'มหาเจดีย์'] }
        };
        let liffProfile = {};

        async function initApp() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (liff.isLoggedIn()) {
                    liffProfile = await liff.getProfile();
                    document.getElementById('userNameDisplay').textContent = liffProfile.displayName;
                } else { liff.login(); }
            } catch (e) { console.error('LIFF Init Error', e); }
            renderOptions();
        }

        function renderOptions() {
            const sel = document.getElementById('activity');
            const keys = Object.keys(currentConfig);
            sel.innerHTML = '<option value="" disabled selected>-- เลือกกิจกรรม --</option>' + 
                keys.map(k => `<option value="${k}">${currentConfig[k].label}</option>`).join('');
        }

        function updateSubOptions() {
            const val = document.getElementById('activity').value;
            const sub = document.getElementById('subOption');
            const data = currentConfig[val];
            if (data && data.list.length > 0) {
                sub.innerHTML = data.list.map(t => `<option value="${t}">${t}</option>`).join('');
                document.getElementById('subContainer').classList.remove('hidden');
            } else { document.getElementById('subContainer').classList.add('hidden'); }
        }

        document.getElementById('meritForm').onsubmit = async function(e) {
            e.preventDefault();
            document.getElementById('loadingOverlay').style.display = 'flex';
            
            const actKey = document.getElementById('activity').value;
            const data = {
                action: 'register',
                userId: liffProfile.userId || 'Guest',
                displayName: liffProfile.displayName || 'Unknown',
                pictureUrl: liffProfile.pictureUrl || '',
                statusMessage: liffProfile.statusMessage || '',
                fullname: document.getElementById('fullname').value,
                phone: document.getElementById('phone').value,
                activity: currentConfig[actKey].label,
                subOption: document.getElementById('subOption').value || '-'
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(data)
                });

                // เก็บประวัติลงเครื่องเพื่อการค้นหา
                const history = JSON.parse(localStorage.getItem('vmove_history') || '[]');
                history.unshift(data);
                localStorage.setItem('vmove_history', JSON.stringify(history));

                document.getElementById('sumName').textContent = data.fullname;
                document.getElementById('sumDetail').textContent = data.activity + " (" + data.subOption + ")";
                document.getElementById('meritForm').classList.add('hidden');
                document.getElementById('successView').classList.remove('hidden');
            } catch (err) { alert('ระบบขัดข้อง กรุณาลองใหม่'); }
            document.getElementById('loadingOverlay').style.display = 'none';
        };

        function toggleSearchModal(s) { document.getElementById('searchModal').classList.toggle('hidden', !s); }
        
        function runSearch() {
            const q = document.getElementById('searchPhone').value;
            const res = document.getElementById('searchResults');
            const history = JSON.parse(localStorage.getItem('vmove_history') || '[]');
            
            if (q.length < 4) {
                res.innerHTML = '<p class="text-center text-gray-400 py-4">พิมพ์เบอร์โทร 4 ตัวขึ้นไปเพื่อค้นหา...</p>';
                return;
            }

            const filtered = history.filter(h => h.phone.includes(q));
            res.innerHTML = filtered.length ? filtered.map(h => `
                <div class="p-5 bg-gray-50 rounded-2xl border-l-8 border-indigo-500 shadow-sm animate-in">
                    <div class="font-bold text-gray-800">${h.fullname}</div>
                    <div class="text-sm text-indigo-600 mt-1">${h.activity} - ${h.subOption}</div>
                </div>`).join('') : '<p class="text-center text-gray-400 py-10">ไม่พบประวัติการจอง 🧐</p>';
        }

        function toggleAdminLogin(s) { document.getElementById('adminLoginModal').classList.toggle('hidden', !s); }
        
        function checkAdmin() {
            if (document.getElementById('adminPass').value === '1234') {
                alert('เข้าสู่โหมดแก้ไขสำเร็จ');
                toggleAdminLogin(false);
            } else { alert('รหัสผ่านไม่ถูกต้อง ❌'); }
        }

        window.onload = initApp;
    </script>
</body>
</html>
